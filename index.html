<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"
    />
    <title>Pallankuzhi</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap");

      :root {
        /* Premium Obsidian & Gold Palette */
        --bg-primary: #06050b; /* Deepest space */
        --bg-secondary: #0c0914; /* Dark obsidian */
        --bg-card: rgba(22, 17, 36, 0.4); /* Glassmorphism base */

        --accent: #fcd34d; /* Rich Gold */
        --accent: #fbbf24; /* Rich Gold */
        --accent-glow: rgba(251, 191, 36, 0.5); /* Stronger core glow */
        --accent-hover: #fef08a; /* Bright Gold */

        --text: #f8fafc; /* Crisp White */
        --text-dim: #94a3b8; /* Slate */

        --bg-color: #050308;
        --board-bg: rgba(
          22,
          17,
          36,
          0.45
        ); /* More sheer, darker violet/blue base */
        --board-border: rgba(255, 255, 255, 0.08); /* Finer border */

        --pit-bg: rgba(0, 0, 0, 0.5);
        --pit-highlight: rgba(251, 191, 36, 0.15); /* Warmer gold highlight */
        --pit-border: rgba(255, 255, 255, 0.05);
        --pit-border-highlight: rgba(255, 255, 255, 0.15);
        --pit-hover: rgba(252, 211, 77, 0.08); /* Gold tinted hover */

        --grain: #eab308;
        --grain-highlight: #fef08a;
        --grain-shadow: #713f12;

        --opponent-accent: #f43f5e; /* Richer ruby/rose for opponent */
        --opponent-glow: rgba(244, 63, 94, 0.3);

        --player-accent: #38bdf8; /* Brighter cyan/blue for player */
        --player-glow: rgba(56, 189, 248, 0.3);

        --text-main: #f8fafc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Outfit", sans-serif;
        background: radial-gradient(
          circle at top center,
          #1b1429 0%,
          var(--bg-color) 100%
        );
        color: var(--text-main);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* ── LAYOUT ────────────────────────────────── */
      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        width: 100%;
        overflow: hidden;
        position: relative;
        z-index: 1; /* Above particles */
      }

      .new-game-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: var(--accent);
        z-index: 100;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .new-game-btn:hover {
        background: rgba(252, 211, 77, 0.15);
        border-color: var(--accent);
        transform: translateY(-2px) rotate(15deg);
        box-shadow: 0 0 20px var(--accent-glow);
      }
      .new-game-btn:active {
        transform: translateY(0) scale(0.95);
      }

      /* ── GAME LEVEL BADGE ───────────────────────── */
      .game-level-badge {
        position: absolute;
        top: 20px;
        left: 16px;
        height: 36px;
        padding: 0 14px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(251, 191, 36, 0.25);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: none; /* Hidden by default, shown via JS */
        align-items: center;
        justify-content: center;
        gap: 6px;
        z-index: 100;
        font-family: "Outfit", sans-serif;
        font-size: 0.62rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent);
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(251, 191, 36, 0.08);
        transition: all 0.3s ease;
      }
      .game-level-badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.8;
        flex-shrink: 0;
        box-shadow: 0 0 6px currentColor;
      }
      .game-level-badge.level-veryeasy {
        color: #4ade80;
        border-color: rgba(74, 222, 128, 0.3);
      }
      .game-level-badge.level-easy {
        color: #38bdf8;
        border-color: rgba(56, 189, 248, 0.3);
      }
      .game-level-badge.level-medium {
        color: var(--accent);
        border-color: rgba(251, 191, 36, 0.3);
      }
      .game-level-badge.level-hard {
        color: #f43f5e;
        border-color: rgba(244, 63, 94, 0.3);
      }

      /* Premium Background Particles (Ambient Dust/Embers) */
      .bg-particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .bg-particles span {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          rgba(252, 211, 77, 0.8) 0%,
          transparent 70%
        );
        animation: drift 25s infinite linear;
        opacity: 0;
        filter: blur(2px);
      }

      @keyframes drift {
        0% {
          transform: translateY(110vh) translateX(-20vw) scale(0.5);
          opacity: 0;
        }
        10% {
          opacity: 0.3;
        }
        50% {
          transform: translateY(50vh) translateX(20vw) scale(1.2);
          opacity: 0.5;
        }
        90% {
          opacity: 0.1;
        }
        100% {
          transform: translateY(-10vh) translateX(-10vw) scale(0.8);
          opacity: 0;
        }
      }

      /* ── AMBIENT BACKGROUND LIGHTING ───────────── */
      .ambient-pool {
        position: fixed;
        width: 200vw;
        height: 100vh;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
        transition:
          opacity 2s ease,
          transform 3s ease;
      }
      .ambient-opp {
        top: -60vh;
        left: -50vw;
        background: radial-gradient(
          circle,
          var(--opponent-accent) 0%,
          transparent 70%
        );
        animation: breathe 8s infinite alternate ease-in-out;
      }
      .ambient-player {
        bottom: -60vh;
        left: -50vw;
        background: radial-gradient(
          circle,
          var(--player-accent) 0%,
          transparent 70%
        );
        animation: breathe 10s infinite alternate-reverse ease-in-out;
        animation-delay: -3s;
      }

      @keyframes breathe {
        0% {
          transform: scale(1);
          opacity: 0.1;
        }
        100% {
          transform: scale(1.1);
          opacity: 0.25;
        }
      }

      body.turn-opp .ambient-opp {
        opacity: 0.35;
        transform: scale(1.15);
      }
      body.turn-player .ambient-player {
        opacity: 0.35;
        transform: scale(1.15);
      }

      /* ── ELEGANT SVG WATERMARK ─────────────────── */
      .bg-watermark {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.03; /* Extremely faint */
        background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ffffff' stroke-width='1.5' fill='none' fill-rule='evenodd' opacity='0.8'%3E%3Cpath d='M200 100 A100 100 0 1 1 200 300 A100 100 0 1 1 200 100 Z M200 50 A150 150 0 1 1 200 350 A150 150 0 1 1 200 50 Z M200 0 A200 200 0 1 1 200 400 A200 200 0 1 1 200 0 Z M100 200 L300 200 M200 100 L200 300 M129 129 L271 271 M129 271 L271 129' /%3E%3C/g%3E%3C/svg%3E");
        background-size: 800px;
        background-position: center;
        background-repeat: repeat;
      }

      /* ── HEADER ────────────────────────────────── */
      .header {
        display: none; /* Removed as requested */
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--accent),
          #ffdd70,
          var(--accent)
        );
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmerText 4s ease-in-out infinite;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      @keyframes shimmerText {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* ── BUTTONS ───────────────────────────────── */
      .sound-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 100;
        transition: all 0.2s;
        backdrop-filter: blur(5px);
      }
      .sound-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.05);
      }

      /* ── SCOREBOARD ────────────────────────────── */
      .scoreboard {
        flex-shrink: 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 6px 12px;
        z-index: 2;
        position: relative;
      }
      .score-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 6px 18px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);
        min-width: 90px;
        transition: all 0.3s ease;
      }
      .score-card.opponent {
        transform-origin: left;
      }
      .score-card.player {
        transform-origin: right;
      }
      .score-card.active {
        border-color: var(--accent);
        box-shadow: 0 0 25px var(--accent-glow);
        transform: scale(1.08);
      }
      @media (max-width: 600px) {
        .scoreboard {
          display: flex; /* Show on mobile */
          padding: 4px 8px;
        }
        .scoreboard .score-card {
          display: none;
        } /* Hide score cards on mobile (shown on board) */
        .difficulty-badge {
          display: none !important;
        } /* Hide difficulty badge on mobile */
      }
      .score-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-dim);
        font-weight: 600;
      }
      .score-value {
        font-size: 1.8rem;
        font-weight: 900;
        transition: all 0.3s ease;
      }
      .score-card.player .score-value {
        color: var(--player-accent);
      }
      .score-card.opponent .score-value {
        color: var(--opponent-accent);
      }

      .board-score-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 20px;
        border-radius: 20px;
        background: rgba(22, 17, 36, 0.45); /* Glassmorphism base */
        border: 1px solid rgba(255, 255, 255, 0.08); /* Finer border */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        min-width: 120px;
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Physics bouncy ease */
        position: absolute;
        z-index: 10;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 1px rgba(255, 255, 255, 0.1);
      }
      .board-score-card.opponent {
        top: -10px;
        left: -160px;
      }
      .board-score-card.player {
        bottom: -10px;
        left: -160px;
      }
      .board-score-card.active {
        border-color: var(--accent);
        background: rgba(252, 211, 77, 0.05);
        box-shadow: 0 0 30px var(--accent-glow);
        transform: scale(1.05);
      }
      .board-score-card.active {
        border-color: var(--accent);
        box-shadow: 0 0 20px var(--accent-glow);
        transform: scale(1.05);
      }
      .board-score-card .score-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-dim);
        font-weight: 600;
      }
      .board-score-card .score-value {
        font-size: 1.4rem;
        font-weight: 900;
        transition: all 0.3s ease;
      }
      .board-score-card.player .score-value {
        color: var(--player-accent);
      }
      .board-score-card.opponent .score-value {
        color: var(--opponent-accent);
      }

      /* ── PREMIUM AI THINKING LOADER ───────────────── */
      .premium-ai-thinker {
        position: absolute;
        /* Exactly match the opponent's 'In Hand' orb position */
        bottom: auto;
        top: -15px;
        left: 50%;
        transform: translateX(-50%) translateY(-100%) scale(0.85);

        background: rgba(12, 9, 20, 0.85);
        border: 1px solid rgba(244, 63, 94, 0.5);
        border-radius: 42px;
        padding: 12px 30px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow:
          0 0 30px rgba(244, 63, 94, 0.3),
          inset 0 0 15px rgba(244, 63, 94, 0.1);
        backdrop-filter: blur(20px);
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body.ai-thinking .premium-ai-thinker {
        opacity: 1;
        transform: translateX(-50%) translateY(-100%) scale(1);
      }

      @media (max-width: 850px) {
        .premium-ai-thinker {
          top: auto;
          bottom: calc(100% + 40px);
          transform: translateX(-50%) scale(0.85);
        }
        body.ai-thinking .premium-ai-thinker {
          transform: translateX(-50%) scale(1);
        }
      }

      .thinker-text {
        font-family: "Outfit", sans-serif;
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--opponent-accent);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: textPulse 1.5s infinite alternate;
      }

      @keyframes textPulse {
        0% {
          opacity: 0.6;
          text-shadow: 0 0 10px rgba(244, 63, 94, 0);
        }
        100% {
          opacity: 1;
          text-shadow: 0 0 15px rgba(244, 63, 94, 0.8);
        }
      }

      .thinker-rings {
        position: relative;
        width: 24px;
        height: 24px;
      }
      .thinker-rings::before,
      .thinker-rings::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--opponent-accent);
        border-bottom-color: var(--opponent-accent);
        animation: doubleSpin 1.5s linear infinite;
      }
      .thinker-rings::after {
        border: 2px solid transparent;
        border-left-color: rgba(251, 191, 36, 0.8); /* Gold accent */
        border-right-color: rgba(251, 191, 36, 0.8);
        animation: doubleSpin 1s linear infinite reverse;
      }
      @keyframes doubleSpin {
        0% {
          transform: rotate(0deg) scale(0.8);
        }
        50% {
          transform: rotate(180deg) scale(1.1);
        }
        100% {
          transform: rotate(360deg) scale(0.8);
        }
      }

      /* Make Opponent Scorecard pulse strongly when AI is thinking */
      body.ai-thinking .board-score-card.opponent {
        border-color: var(--opponent-accent);
        box-shadow: 0 0 40px rgba(244, 63, 94, 0.6);
        transform: scale(1.1);
      }

      .mobile-layout-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        width: 100%;
        position: relative;
      }

      /* Responsive: on smaller screens, stack scorecards and board vertically */
      @media (max-width: 850px) {
        .board-wrapper {
          align-items: stretch; /* Allow stack to span full height */
          padding: 10px;
        }
        .mobile-layout-stack {
          gap: 0;
          justify-content: space-between;
          min-height: 100%;
          padding: 60px 0; /* Keeps scorecards 60px away from the absolute top/bottom */
          box-sizing: border-box;
        }
        .board-score-card {
          position: relative !important;
          left: auto !important;
          top: auto !important;
          bottom: auto !important;
          transform: none !important;
          margin: 0;
          min-width: 140px;
          padding: 10px 24px;
        }
        .board-score-card.opponent {
          order: 1;
        }
        .board {
          order: 2;
          margin: auto 0;
        } /* dynamically center board in available space */
        .board-score-card.player {
          order: 3;
        }

        .board-score-card .score-value {
          font-size: 1.8rem;
        }
        .board-score-card .score-label {
          font-size: 0.7rem;
        }
      }

      .turn-indicator {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .turn-indicator-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .turn-text {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--accent);
        min-height: 1.2em;
      }
      .turn-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.5s infinite;
      }
      .round-badge,
      .difficulty-badge {
        background: rgba(255, 255, 255, 0.08); /* Darker premium badge */
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        backdrop-filter: blur(4px);
      }
      .difficulty-badge {
        color: var(--accent);
        border-color: rgba(251, 191, 36, 0.3);
        background: rgba(251, 191, 36, 0.05);
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 var(--accent-glow);
        }
        50% {
          box-shadow: 0 0 0 8px transparent;
        }
      }

      /* ── BOARD ─────────────────────────────────── */
      .board-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        z-index: 2;
        position: relative;
        min-height: 0;
        overflow-y: auto; /* Allow scrolling if screen is very short */
      }

      .board {
        width: 95%;
        max-width: 520px;
        background: var(--board-bg);
        border: 1px solid var(--board-border);
        border-radius: 40px;
        padding: 36px 24px;
        position: relative;
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        box-shadow:
          0 0 50px rgba(0, 0, 0, 0.8),
          0 20px 80px rgba(0, 0, 0, 0.95),
          inset 0 1px 1px rgba(255, 255, 255, 0.1),
          inset 0 -1px 2px rgba(0, 0, 0, 0.8);
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @media (max-width: 540px) {
        .board {
          width: 98%;
          padding: 24px 12px;
          border-radius: 32px;
        }
        .pit-row {
          gap: 6px;
          padding: 4px 2px;
        }
      }

      .board::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 33px;
        background: linear-gradient(
          145deg,
          rgba(252, 211, 77, 0.15),
          transparent 40%,
          transparent 60%,
          rgba(56, 189, 248, 0.1)
        );
        z-index: -1;
      }

      .board-divider {
        height: 1px;
        margin: 12px 20px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
      }

      .pit-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
        padding: 4px 6px;
      }

      /* ── 3D CARVED PITS ────────────────────────── */
      .pit {
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--pit-bg);
        border: 1px solid var(--pit-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: default;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        overflow: visible;
        /* 3D Carved effect */
        box-shadow:
          inset 0 4px 6px rgba(0, 0, 0, 0.6),
          inset 0 0 10px rgba(0, 0, 0, 0.8),
          0 1px 1px rgba(255, 255, 255, 0.08);
      }

      .pit.clickable {
        cursor: pointer;
      }

      /* Player hover state */
      #rowPlayer .pit.clickable:hover {
        border-color: rgba(56, 189, 248, 0.4);
        background: radial-gradient(
          circle at 50% 120%,
          rgba(56, 189, 248, 0.2),
          var(--pit-bg)
        );
        box-shadow:
          inset 0 4px 6px rgba(0, 0, 0, 0.5),
          inset 0 0 10px rgba(0, 0, 0, 0.7),
          0 0 20px rgba(56, 189, 248, 0.15),
          0 1px 1px rgba(255, 255, 255, 0.08);
        transform: translateY(-4px) scale(1.02);
      }

      /* Opponent hover state (two player mode) */
      #rowOpponent .pit.clickable:hover {
        border-color: rgba(244, 63, 94, 0.4);
        background: radial-gradient(
          circle at 50% -20%,
          rgba(244, 63, 94, 0.2),
          var(--pit-bg)
        );
        box-shadow:
          inset 0 4px 6px rgba(0, 0, 0, 0.5),
          inset 0 0 10px rgba(0, 0, 0, 0.7),
          0 0 20px rgba(244, 63, 94, 0.15),
          0 1px 1px rgba(255, 255, 255, 0.08);
        transform: translateY(4px) scale(1.02);
      }

      .pit.clickable:active {
        transform: scale(0.92);
        box-shadow:
          inset 0 8px 12px rgba(0, 0, 0, 0.8),
          inset 0 0 15px rgba(0, 0, 0, 0.9),
          0 0 0 transparent;
      }

      /* Last picked pit indicator - floating ring */
      .pit.last-picked::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        box-shadow:
          0 0 10px var(--accent-glow),
          inset 0 0 10px var(--accent-glow);
        animation:
          lastPickedPulse 2s ease-in-out infinite,
          lastPickedSpin 8s linear infinite;
        pointer-events: none;
        clip-path: polygon(
          0 0,
          100% 0,
          100% 20%,
          0 20%,
          0 40%,
          100% 40%,
          100% 60%,
          0 60%,
          0 80%,
          100% 80%,
          100% 100%,
          0 100%
        );
      }
      @keyframes lastPickedPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.4;
        }
      }
      @keyframes lastPickedSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .pit-count {
        font-family: "Inter", sans-serif;
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--text);
        z-index: 2;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        transition: all 0.25s ease;
        position: relative;
        line-height: 1;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        /* Dark glass backing behind the number */
        background: radial-gradient(
          circle at 50% 50%,
          rgba(10, 8, 16, 0.85) 50%,
          transparent 100%
        );
      }
      @media (max-width: 540px) {
        .pit-count {
          font-size: 1rem;
          width: 24px;
          height: 24px;
        }
      }
      .pit.empty .pit-count {
        color: var(--text-dim);
        opacity: 0.3;
        text-shadow: none;
      }

      .pit-number {
        position: absolute;
        bottom: -18px;
        font-size: 0.55rem;
        font-weight: 700;
        color: var(--text-dim);
        opacity: 0.4;
        pointer-events: none;
      }

      /* ── 3D GLOWING GRAINS (SEEDS) ────────────────────────── */
      .grain-dots {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
      }
      .grain-dot {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        /* 3D Sphere effect */
        background: radial-gradient(
          circle at 30% 30%,
          var(--grain-highlight),
          var(--grain) 40%,
          var(--grain-shadow) 90%
        );
        box-shadow:
          inset -1px -1px 2px rgba(0, 0, 0, 0.5),
          0 0 4px rgba(251, 191, 36, 0.4);
        transform: translate(-50%, -50%);
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Animations */
      .pit.dropping {
        animation: dropPulse 0.3s ease;
      }
      @keyframes dropPulse {
        0% {
          box-shadow: 0 0 0 0 var(--accent-glow);
        }
        50% {
          box-shadow: 0 0 20px 4px var(--accent-glow);
          border-color: var(--accent);
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
      }

      .pit.picking {
        animation: pickPulse 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 10;
      }
      @keyframes pickPulse {
        0% {
          transform: scale(1);
          border-color: var(--pit-border);
          box-shadow: none;
        }
        15% {
          transform: scale(0.8);
          border-color: var(--accent);
          box-shadow:
            0 0 30px 8px var(--accent-glow),
            inset 0 0 15px rgba(240, 192, 64, 0.2);
        }
        35% {
          transform: scale(1.12);
          border-color: #ffd700;
          box-shadow:
            0 0 40px 12px rgba(255, 215, 0, 0.5),
            0 0 80px 20px rgba(240, 192, 64, 0.15);
        }
        55% {
          transform: scale(0.95);
          border-color: var(--accent);
          box-shadow: 0 0 20px 4px var(--accent-glow);
        }
        100% {
          transform: scale(1);
          border-color: var(--pit-border);
          box-shadow: none;
        }
      }

      /* Expanding ring burst on pick */
      .pick-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        border: 3px solid var(--accent);
        transform: translate(-50%, -50%);
        animation: ringExpand 0.7s ease-out forwards;
        pointer-events: none;
        z-index: 9;
      }
      @keyframes ringExpand {
        0% {
          width: 20%;
          height: 20%;
          opacity: 1;
          border-width: 3px;
        }
        100% {
          width: 180%;
          height: 180%;
          opacity: 0;
          border-width: 1px;
        }
      }

      /* Burst particles on pick */
      .pick-particle {
        position: fixed;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 1000;
        animation: particleBurst 0.7s ease-out forwards;
      }
      @keyframes particleBurst {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: var(--particle-dir) scale(0.3);
        }
      }

      .pit.capturing {
        animation: capturePulse 0.6s ease;
      }
      @keyframes capturePulse {
        0% {
          transform: scale(1);
        }
        20% {
          transform: scale(1.15);
          border-color: #ff6b6b;
          box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }
        50% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1);
          box-shadow: none;
        }
      }

      .pit.instant4 {
        animation: instant4Pulse 0.5s ease;
      }
      @keyframes instant4Pulse {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.2);
          border-color: var(--accent);
          box-shadow:
            0 0 35px var(--accent-glow),
            0 0 60px rgba(240, 192, 64, 0.3);
        }
        100% {
          transform: scale(1);
          box-shadow: none;
        }
      }

      /* Flying grain animation (for distribution) */
      .flying-grain {
        position: fixed;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        /* 3D Sphere effect matching the new beads */
        background: radial-gradient(
          circle at 30% 30%,
          var(--grain-highlight),
          var(--grain) 40%,
          var(--grain-shadow) 90%
        );
        box-shadow:
          inset -1px -1px 2px rgba(0, 0, 0, 0.5),
          0 0 12px rgba(251, 191, 36, 0.8),
          0 4px 8px rgba(0, 0, 0, 0.5);
        z-index: 1001;
        pointer-events: none;
        will-change: transform, left, top;
      }
      .flying-grain.in-flight {
        transition:
          left 0.32s cubic-bezier(0.2, 0.6, 0.35, 1),
          top 0.32s cubic-bezier(0.2, 0, 0.35, 1);
      }

      /* Trail dot left behind during flight */
      .grain-trail {
        position: fixed;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(251, 191, 36, 0.9),
          transparent
        );
        pointer-events: none;
        z-index: 1000;
        animation: trailFade 0.4s ease-out forwards;
        filter: blur(1px);
      }
      @keyframes trailFade {
        0% {
          opacity: 0.8;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.2);
        }
      }

      /* Grain landing burst */
      .grain-land-burst {
        position: fixed;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid rgba(251, 191, 36, 0.8);
        pointer-events: none;
        z-index: 1000;
        animation: landBurst 0.35s ease-out forwards;
        transform: translate(-50%, -50%);
      }
      @keyframes landBurst {
        0% {
          opacity: 1;
          width: 4px;
          height: 4px;
          border-width: 3px;
        }
        100% {
          opacity: 0;
          width: 36px;
          height: 36px;
          border-width: 1px;
        }
      }

      /* Collecting grain (fly to hand) */
      .collecting-grain {
        position: fixed;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          var(--grain-highlight),
          var(--grain) 40%,
          var(--grain-shadow) 90%
        );
        box-shadow:
          0 0 10px rgba(251, 191, 36, 0.6),
          0 2px 6px rgba(0, 0, 0, 0.6);
        z-index: 1001;
        pointer-events: none;
        transition:
          left 0.35s cubic-bezier(0.3, 0, 0.3, 1),
          top 0.35s cubic-bezier(0.3, 0, 0.3, 1),
          opacity 0.35s ease;
      }

      /* Score fly animation */
      .score-fly {
        position: fixed;
        z-index: 999;
        pointer-events: none;
        font-size: 1.2rem;
        font-weight: 900;
        animation: flyUp 1s ease-out forwards;
      }
      .score-fly.player-fly {
        color: var(--player-accent);
      }
      .score-fly.opponent-fly {
        color: var(--opponent-accent);
      }

      @keyframes flyUp {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-60px) scale(1.5);
        }
      }

      /* ── HAND INDICATOR (Premium Floating Circle) ─ */
      .hand-display {
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        z-index: 20;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Hidden by default when empty */
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .hand-display.visible {
        opacity: 1;
        pointer-events: auto;
      }
      /* When playing from opponent/top side, move orb above the board */
      .hand-display.top-side {
        bottom: auto;
        top: -15px;
        transform: translateX(-50%) translateY(-100%);
      }
      /* Let's define the base .hand-orb style FIRST so media queries can override it */
      .hand-orb {
        position: relative;
        width: 84px;
        height: 84px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Glassmorphism base */
        background: radial-gradient(
          circle at 40% 35%,
          rgba(30, 30, 80, 0.95),
          rgba(15, 15, 50, 0.98)
        );
        border: 2px solid rgba(240, 192, 64, 0.5);
        box-shadow:
          0 0 25px 5px rgba(240, 192, 64, 0.2),
          0 0 60px 10px rgba(240, 192, 64, 0.08),
          0 8px 32px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          inset 0 -2px 6px rgba(0, 0, 0, 0.4);
        animation: orbFloat 3s ease-in-out infinite;
      }

      @media (max-width: 850px) {
        /* Center the orb exactly between game board bottom and player score card */
        .hand-display {
          bottom: auto;
          top: calc(100% + 20px);
          left: 50%;
          right: auto;
          transform: translateX(-50%);
          position: absolute;
        }
        .hand-display.top-side {
          top: auto;
          bottom: calc(100% + 20px);
          left: 50%;
          right: auto;
          transform: translateX(-50%);
        }
        .hand-orb {
          width: 70px;
          height: 70px;
        }
        .hand-count {
          font-size: 1.1rem;
        }
      }
      .hand-display.top-side .hand-label-text {
        order: -1;
        margin-top: 0;
        margin-bottom: 4px;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      /* Rotating ring around the orb */
      .hand-orb::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 2px dashed rgba(240, 192, 64, 0.3);
        animation: orbRingSpin 8s linear infinite;
        pointer-events: none;
      }

      /* Outer glow ring */
      .hand-orb::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: transparent;
        border: 1px solid rgba(240, 192, 64, 0.15);
        animation: orbGlowPulse 2s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes orbRingSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes orbGlowPulse {
        0%,
        100% {
          box-shadow: 0 0 8px rgba(240, 192, 64, 0.15);
        }
        50% {
          box-shadow: 0 0 20px rgba(240, 192, 64, 0.35);
        }
      }

      /* Count number in the center */
      .hand-count {
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--accent);
        text-shadow:
          0 0 12px rgba(240, 192, 64, 0.6),
          0 0 30px rgba(240, 192, 64, 0.2);
        line-height: 1;
        z-index: 3;
        position: relative;
      }

      /* Small grain dots orbiting inside the circle */
      .hand-grain-ring {
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
      }
      .hand-grain-dot {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ffe070, var(--grain));
        box-shadow: 0 0 4px rgba(240, 192, 64, 0.6);
        transform: translate(-50%, -50%);
        animation: grainAppear 0.25s ease both;
      }
      @keyframes grainAppear {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      /* "IN HAND" label below the orb */
      .hand-label-text {
        display: none; /* Removed as requested */
      }

      /* Active turn row highlight */
      .pit-row.active-turn {
        border-radius: 40px;
        position: relative;
        z-index: 1;
      }

      #rowPlayer.active-turn {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(56, 189, 248, 0.05),
          transparent
        );
        box-shadow:
          0 0 30px rgba(56, 189, 248, 0.2),
          inset 0 0 20px rgba(56, 189, 248, 0.15);
        border: 1px solid rgba(56, 189, 248, 0.4);
        animation: playerRowPulse 2s ease-in-out infinite;
      }
      @keyframes playerRowPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
          border-color: rgba(56, 189, 248, 0.2);
        }
        50% {
          box-shadow:
            0 0 45px rgba(56, 189, 248, 0.4),
            inset 0 0 30px rgba(56, 189, 248, 0.2);
          border-color: rgba(56, 189, 248, 0.7);
        }
      }

      #rowOpponent.active-turn {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(244, 63, 94, 0.05),
          transparent
        );
        box-shadow:
          0 0 30px rgba(244, 63, 94, 0.2),
          inset 0 0 20px rgba(244, 63, 94, 0.15);
        border: 1px solid rgba(244, 63, 94, 0.4);
        animation: oppRowPulse 2s ease-in-out infinite;
      }
      @keyframes oppRowPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(244, 63, 94, 0.1);
          border-color: rgba(244, 63, 94, 0.2);
        }
        50% {
          box-shadow:
            0 0 45px rgba(244, 63, 94, 0.4),
            inset 0 0 30px rgba(244, 63, 94, 0.2);
          border-color: rgba(244, 63, 94, 0.7);
        }
      }

      /* Dead pit (not filled at round start — skipped during distribution) */
      .pit.dead {
        opacity: 0.15;
        filter: saturate(0.2);
        pointer-events: none !important;
        cursor: default !important;
        border-style: dashed !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
        box-shadow: none !important;
      }
      .pit.dead .pit-count {
        display: none;
      }
      .pit.dead .grain-dots {
        display: none;
      }

      /* Round indicator */
      .round-badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      /* ── CONTROLS & STATUS ─────────────────────── */
      .controls {
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 8px 16px 16px;
        z-index: 2;
      }

      .btn {
        padding: 12px 28px;
        border: none;
        border-radius: 16px;
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }
      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        pointer-events: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, #fbbf24, #d97706);
        color: #000;
        box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
      }
      .btn-primary:active {
        transform: scale(0.92);
        box-shadow: 0 2px 8px rgba(251, 191, 36, 0.4);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }
      .btn-secondary:active {
        transform: scale(0.92);
        background: rgba(255, 255, 255, 0.08);
      }

      .status-bar {
        flex-shrink: 0;
        text-align: center;
        padding: 4px;
        z-index: 2;
        font-size: 0.75rem;
        color: var(--text-dim);
        font-weight: 600;
        min-height: 22px;
      }

      /* ── PREMIUM MODALS (Vision OS Style) ─────────────────────────────────── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        background: rgba(22, 17, 36, 0.6); /* Very sheer dark glass */
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 36px 30px;
        text-align: center;
        max-width: 380px;
        width: 100%;
        transform: scale(0.85) translateY(40px);
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.6),
          inset 0 1px 1px rgba(255, 255, 255, 0.15);
        position: relative;
        overflow: hidden;
      }
      .modal::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(251, 191, 36, 0.1),
          transparent 60%
        );
        pointer-events: none;
      }
      .modal-overlay.show .modal {
        transform: scale(1) translateY(0);
      }

      .modal-icon {
        font-size: 3.5rem;
        margin-bottom: 12px;
        filter: drop-shadow(0 4px 10px rgba(251, 191, 36, 0.3));
      }
      .modal h2 {
        font-family: "Outfit", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #fff, #fbbf24);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }
      .modal p {
        font-family: "Inter", sans-serif;
        font-size: 0.9rem;
        color: var(--text-dim);
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .modal .btn {
        width: 100%;
        margin-top: 8px;
      }

      .mode-select {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }
      .difficulty-select {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .difficulty-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-dim);
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .difficulty-btn.active {
        background: rgba(251, 191, 36, 0.1);
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
      }

      /* Round Summary Data Grid */
      .round-summary {
        display: flex;
        justify-content: space-around;
        padding: 16px 0;
        margin-bottom: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .round-stat {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .round-stat .label {
        font-size: 0.65rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .round-stat .val {
        font-family: "Inter", sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--text);
      }
      .round-stat.player1 .val {
        color: var(--opponent-accent);
        text-shadow: 0 0 10px var(--opponent-glow);
      }
      .round-stat.player2 .val {
        color: var(--player-accent);
        text-shadow: 0 0 10px var(--player-glow);
      }
      /* ── RIPPLE ───────────────────────────────── */
      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(240, 192, 64, 0.25);
        transform: scale(0);
        animation: rippleAnim 0.6s ease-out;
        pointer-events: none;
        z-index: 10;
      }
      @keyframes rippleAnim {
        to {
          transform: scale(3);
          opacity: 0;
        }
      }

      /* ── CONFETTI ─────────────────────────────── */
      .confetti-piece {
        position: fixed;
        z-index: 200;
        pointer-events: none;
        width: 8px;
        height: 8px;
        animation: confettiFall 2.5s ease-out forwards;
      }
      @keyframes confettiFall {
        0% {
          opacity: 1;
          transform: translateY(0) rotate(0deg) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(100vh) rotate(720deg) scale(0.3);
        }
      }

      /* ── RESPONSIVE ───────────────────────────── */
      @media (max-height: 650px) {
        .header {
          padding: 6px 16px 2px;
        }
        .header h1 {
          font-size: 1.2rem;
        }
        .scoreboard {
          padding: 4px 12px;
        }
        .score-card {
          padding: 4px 14px;
        }
        .score-value {
          font-size: 1.4rem;
        }
        .board {
          padding: 8px 6px;
        }
        .pit-row {
          gap: 3px;
        }
        .hand-orb {
          width: 56px;
          height: 56px;
        }
        .hand-count {
          font-size: 1.2rem;
        }
        .hand-display {
          bottom: -24px;
        }
        .controls {
          padding: 4px 16px 8px;
        }
      }

      @media (min-width: 500px) {
        .pit-count {
          font-size: 1.3rem;
        }
        .grain-dot {
          width: 8px;
          height: 8px;
        }
      }

      /* ── AI PIT INDICATOR ─────────────────────── */
      .pit.ai-pit-indicator {
        border-color: var(--opponent-accent) !important;
        box-shadow:
          0 0 20px rgba(244, 63, 94, 0.5),
          0 0 40px rgba(244, 63, 94, 0.3),
          inset 0 0 10px rgba(244, 63, 94, 0.2) !important;
        animation: aiPitPulse 0.6s ease-in-out infinite alternate !important;
        transform: scale(1.08) !important;
        z-index: 10;
      }
      @keyframes aiPitPulse {
        0% {
          box-shadow:
            0 0 15px rgba(244, 63, 94, 0.4),
            inset 0 0 8px rgba(244, 63, 94, 0.15);
          transform: scale(1.05);
        }
        100% {
          box-shadow:
            0 0 30px rgba(244, 63, 94, 0.7),
            0 0 50px rgba(244, 63, 94, 0.3),
            inset 0 0 15px rgba(244, 63, 94, 0.25);
          transform: scale(1.1);
        }
      }

      /* ── UNDO BUTTON ──────────────────────────── */
      .undo-btn {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.3);
        backdrop-filter: blur(12px);
        display: none; /* Shown via JS */
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: var(--player-accent);
        z-index: 100;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        font-size: 1.2rem;
      }
      .undo-btn:hover {
        background: rgba(56, 189, 248, 0.2);
        border-color: var(--player-accent);
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      }
      .undo-btn:active {
        transform: scale(0.95);
      }

      /* ── PREVIOUS ROUND BUTTON ── HIDDEN ────────── */
      .prev-round-btn {
        display: none !important;
      }

      /* ── RESET ROUND BUTTON ── HIDDEN ────────────── */
      .reset-round-btn {
        display: none !important;
      }

      /* ── COIN TOSS OVERLAY ────────────────────── */
      .coin-toss-overlay {
        position: fixed;
        inset: 0;
        background: rgba(5, 3, 8, 0.92);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 300;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .coin-toss-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .coin-toss-title {
        font-size: 1.4rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--accent);
        margin-bottom: 40px;
        text-shadow: 0 0 20px var(--accent-glow);
      }
      .coin-container {
        perspective: 1000px;
        margin-bottom: 30px;
      }
      .coin {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s ease;
      }
      .coin .coin-face {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 3px solid;
        box-shadow:
          0 0 30px rgba(0, 0, 0, 0.5),
          inset 0 0 20px rgba(255, 255, 255, 0.1);
      }
      .coin .coin-heads {
        background: linear-gradient(145deg, #1a3a4a, #0d2633);
        border-color: rgba(56, 189, 248, 0.5);
        color: var(--player-accent);
      }
      .coin .coin-heads .coin-icon {
        font-size: 2.4rem;
        margin-bottom: 4px;
      }
      .coin .coin-heads .coin-label {
        font-size: 0.65rem;
        letter-spacing: 2px;
      }
      .coin .coin-tails {
        background: linear-gradient(145deg, #3a1a2a, #260d1a);
        border-color: rgba(244, 63, 94, 0.5);
        color: var(--opponent-accent);
        transform: rotateY(180deg);
      }
      .coin .coin-tails .coin-icon {
        font-size: 2.4rem;
        margin-bottom: 4px;
      }
      .coin .coin-tails .coin-label {
        font-size: 0.65rem;
        letter-spacing: 2px;
      }

      /* Flip animation */
      .coin.flipping {
        animation: coinFlip 1.8s ease-in-out forwards;
      }
      @keyframes coinFlip {
        0% {
          transform: rotateY(0deg);
        }
        20% {
          transform: rotateY(540deg);
        }
        40% {
          transform: rotateY(1080deg);
        }
        60% {
          transform: rotateY(1620deg);
        }
        80% {
          transform: rotateY(2160deg);
        }
        100% {
          transform: rotateY(2520deg);
        } /* 7 full rotations — lands on heads by default */
      }
      .coin.result-heads {
        transform: rotateY(0deg);
        transition: transform 0.3s ease;
      }
      .coin.result-tails {
        transform: rotateY(180deg);
        transition: transform 0.3s ease;
      }

      .coin-result-text {
        font-size: 1.5rem;
        font-weight: 800;
        margin-top: 20px;
        min-height: 2em;
        text-shadow: 0 0 15px currentColor;
        letter-spacing: 1px;
      }
      .coin-toss-btn {
        margin-top: 20px;
        padding: 14px 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), #f59e0b);
        border: none;
        color: #1a0f00;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s ease;

      }
      .coin-toss-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(251, 191, 36, 0.5);
      }
      .coin-toss-btn:active {
        transform: translateY(0) scale(0.97);
      }
      .coin-toss-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Elegant Watermark -->
      <div class="bg-watermark"></div>

      <!-- Previous Round Button -->
      <button

    <!-- Game Over Modal -->

            "

          >

    <script>
      // ═══════════════════════════════════════════════
      //  AUDIO SYNTHESIS (Zero-Latency Web Audio API)
      // ═══════════════════════════════════════════════
      const AudioManager = {
        ctx: null,
        isMuted: false,

        init() {
          if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.ctx.state === "suspended") {
            this.ctx.resume();
          }
        },

        // Used for melodic/musical UI tones (chimes, wins)
        playTone(freq, type, duration, vol, delay = 0) {
          if (this.isMuted) return;
          this.init();

          const osc = this.ctx.createOscillator();
          const gainNode = this.ctx.createGain();

          osc.type = type;
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);

          // Smooth envelope for musical tones
          gainNode.gain.setValueAtTime(0, this.ctx.currentTime + delay);
          gainNode.gain.linearRampToValueAtTime(
            vol,
            this.ctx.currentTime + delay + 0.02,
          );
          gainNode.gain.exponentialRampToValueAtTime(
            0.001,
            this.ctx.currentTime + delay + duration,
          );

          osc.connect(gainNode);
          gainNode.connect(this.ctx.destination);

          osc.start(this.ctx.currentTime + delay);
          osc.stop(this.ctx.currentTime + delay + duration);
        },

        // Used for physical game events (seeds hitting wood)
        playPercussive(freq, duration, vol, delay = 0) {
          if (this.isMuted) return;
          this.init();

          const osc = this.ctx.createOscillator();
          const gainNode = this.ctx.createGain();

          osc.type = "sine"; // Sine works best for soft wood thuds
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
          // Slight pitch drop creates a realistic "thud" effect
          osc.frequency.exponentialRampToValueAtTime(
            freq * 0.6,
            this.ctx.currentTime + delay + duration,
          );

          // Instant attack, ultra-fast exponential decay
          gainNode.gain.setValueAtTime(vol, this.ctx.currentTime + delay);
          gainNode.gain.exponentialRampToValueAtTime(
            0.001,
            this.ctx.currentTime + delay + duration,
          );

          osc.connect(gainNode);
          gainNode.connect(this.ctx.destination);

          osc.start(this.ctx.currentTime + delay);
          osc.stop(this.ctx.currentTime + delay + duration);
        },

        // Specific Sound Effects
        click() {
          this.playPercussive(300, 0.05, 0.2);
        },

        pitSelect() {
          this.playPercussive(250, 0.1, 0.3);
          this.playPercussive(350, 0.1, 0.1);
        },

        grainDrop(pitchOffset = 0) {
          // Convert the random 0-5 input into a C-Major Pentatonic scale note
          // This ensures that when dozens of grains drop during distribution,
          // it sounds like a beautiful, harmonized wind chime instead of chaotic noise.
          const pentatonic = [523.25, 587.33, 659.25, 783.99, 880.0, 1046.5]; // C5, D5, E5, G5, A5, C6
          const noteIdx = Math.floor(pitchOffset) % pentatonic.length;
          const freq = pentatonic[noteIdx];

          // Play a bright, crystalline 'plink'
          this.playTone(freq, "sine", 0.12, 0.15); // Main bell body
          this.playTone(freq * 2, "triangle", 0.05, 0.05); // High-frequency attack ping
        },

        capture(count) {
          // Gentle sparkling chime
          const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
          const maxNotes = Math.min(count, notes.length);
          for (let i = 0; i < maxNotes; i++) {
            this.playTone(notes[i], "triangle", 0.3, 0.1, i * 0.08); // Softer, slower arpeggio
          }
        },

        win() {
          this.playTone(440, "triangle", 0.4, 0.2, 0);
          this.playTone(554.37, "triangle", 0.4, 0.2, 0.1);
          this.playTone(659.25, "triangle", 0.6, 0.2, 0.2);
          this.playTone(880, "sine", 1.0, 0.3, 0.3);
        },

        lose() {
          this.playTone(349.23, "triangle", 0.4, 0.2, 0); // F4
          this.playTone(329.63, "triangle", 0.4, 0.2, 0.2); // E4
          this.playTone(311.13, "triangle", 0.4, 0.2, 0.4); // Eb4
          this.playTone(293.66, "sine", 1.0, 0.2, 0.6); // D4
        },
      };

      function toggleSound() {
        AudioManager.isMuted = !AudioManager.isMuted;
        AudioManager.init(); // Attempt to initialize on user click if not already

        if (AudioManager.isMuted) {
          document.getElementById("icon-sound-on").style.display = "none";
          document.getElementById("icon-sound-off").style.display = "block";
        } else {
          document.getElementById("icon-sound-on").style.display = "block";
          document.getElementById("icon-sound-off").style.display = "none";
          AudioManager.click();
        }
      }

      // ═══════════════════════════════════════════════
      //  GAME STATE
      // ═══════════════════════════════════════════════
      const PITS_PER_SIDE = 7;
      const INITIAL_GRAINS = 5;
      const GRAIN_FLY_MS = 600; // Time for each grain to fly
      const GRAIN_STAGGER_MS = 150; // Pause after landing before next grain flies
      const AI_THINK_MS = 1500; // AI thinking phase
      const AI_INDICATE_MS = 2000; // AI pit indication phase
      const AI_PRE_DIST_MS = 1500; // Pause before AI distribution
      const ANIM_PICK_MS = 500; // Picking animation duration
      const ANIM_CAPTURE_MS = 400; // Capture animation duration
      const ANIM_SETTLE_MS = 150; // Settle time after grains land
      const MAX_ROUND_MOVES = 200; // Max total moves per round (infinite loop safety)
      const MAX_CHAIN_PICKS = 500; // Max chain picks in a single turn

      let board = { opp: [], player: [] }; // opp[0..6] = pits 1-7, player[0..6] = pits 1-7
      let scores = { player: 0, opp: 0 };
      let isPlayerTurn = true;
      let isAnimating = false;
      let aiDepth = 2;
      let pendingDifficulty = 2;
      let gameOver = false;
      let gameMode = "single"; // 'single', 'two', 'pro'
      let isAiTurn = false; // Track if AI is currently playing

      // Multi-round state
      let roundNumber = 1;
      let bankedGrains = { player: 0, opp: 0 };
      let deadPits = {
        opp: Array(PITS_PER_SIDE).fill(false),
        player: Array(PITS_PER_SIDE).fill(false),
      };
      let lastTurnSide = null; // Tracks who played last in the round
      let pendingTimeouts = []; // Track all setTimeouts for reliable reset
      let preComputedAiMove = null; // AI pre-computation during player animation
      let aiMoveStartTime = 0; // Time tracking for AI computation
      let boardStateHistory = []; // Track board states for cycle detection
      let roundMoveCount = 0; // Total moves in current round
      let firstPickSide = null; // Who picked first THIS round (for alternation)

      // Undo / Back state
      let moveHistory = []; // Stack of board snapshots for undo

      // Round history for "go to previous round"
      let roundHistory = []; // Stack of round-start snapshots

      // ─── Helper to track timeouts for cleanup ───
      function safeTimeout(fn, ms) {
        const id = setTimeout(() => {
          pendingTimeouts = pendingTimeouts.filter((t) => t !== id);
          fn();
        }, ms);
        pendingTimeouts.push(id);
        return id;
      }

      function clearAllTimeouts() {
        pendingTimeouts.forEach((id) => clearTimeout(id));
        pendingTimeouts = [];
      }

      // ═══════════════════════════════════════════════
      //  INIT
      // ═══════════════════════════════════════════════
      function initBoard() {
        clearAllTimeouts();
        board.opp = Array(PITS_PER_SIDE).fill(INITIAL_GRAINS);
        board.player = Array(PITS_PER_SIDE).fill(INITIAL_GRAINS);
        scores = { player: 0, opp: 0 };
        isPlayerTurn = true;
        gameOver = false;
        isAnimating = false;
        isAiTurn = false;
        roundNumber = 1;
        bankedGrains = { player: 0, opp: 0 };
        deadPits = {
          opp: Array(PITS_PER_SIDE).fill(false),
          player: Array(PITS_PER_SIDE).fill(false),
        };
        lastTurnSide = null;
        boardStateHistory = []; // Reset cycle detection
        roundMoveCount = 0;
        firstPickSide = null;
        moveHistory = [];
        roundHistory = [];

        // Clear any lingering UI highlights from previous games
        document
          .querySelectorAll(".pit")
          .forEach((p) =>
            p.classList.remove("last-picked", "dead", "ai-pit-indicator"),
          );
      }

      function buildDOM() {
        const rowOpp = document.getElementById("rowOpponent");
        const rowPlayer = document.getElementById("rowPlayer");
        rowOpp.innerHTML = "";
        rowPlayer.innerHTML = "";

        for (let i = 0; i < PITS_PER_SIDE; i++) {
          rowOpp.appendChild(createPitEl("opp", i));
          rowPlayer.appendChild(createPitEl("player", i));
        }
        createBgParticles();
      }

      function createPitEl(side, idx) {
        const pit = document.createElement("div");
        pit.className = "pit";
        pit.id = `pit-${side}-${idx}`;
        pit.dataset.side = side;
        pit.dataset.idx = idx;

        const count = document.createElement("div");
        count.className = "pit-count";
        count.id = `count-${side}-${idx}`;
        pit.appendChild(count);

        const dots = document.createElement("div");
        dots.className = "grain-dots";
        dots.id = `dots-${side}-${idx}`;
        pit.appendChild(dots);

        const num = document.createElement("div");
        num.className = "pit-number";
        num.textContent = idx + 1;
        pit.appendChild(num);

        if (side === "player") {
          pit.addEventListener("click", () => onPitClick(idx));
          pit.addEventListener(
            "touchstart",
            (e) => {
              if (e.cancelable) e.preventDefault();
              onPitClick(idx);
            },
            { passive: false },
          );
        } else {
          pit.addEventListener("click", () => onOppPitClick(idx));
          pit.addEventListener(
            "touchstart",
            (e) => {
              if (e.cancelable) e.preventDefault();
              onOppPitClick(idx);
            },
            { passive: false },
          );
        }

        return pit;
      }

      function createBgParticles() {
        const container = document.getElementById("bgParticles");
        container.innerHTML = "";
        for (let i = 0; i < 8; i++) {
          const span = document.createElement("span");
          const size = 60 + Math.random() * 120;
          span.style.width = size + "px";
          span.style.height = size + "px";
          span.style.left = Math.random() * 100 + "%";
          span.style.top = Math.random() * 100 + "%";
          span.style.animationDelay = Math.random() * 10 + "s";
          span.style.animationDuration = 15 + Math.random() * 15 + "s";
          container.appendChild(span);
        }
      }

      // ═══════════════════════════════════════════════
      //  RENDERING
      // ═══════════════════════════════════════════════
      function renderAll() {
        for (let i = 0; i < PITS_PER_SIDE; i++) {
          renderPit("opp", i);
          renderPit("player", i);
        }
        renderScores();
        renderTurn();
        renderHand(0);
        updateClickable();
      }

      function renderPit(side, idx) {
        const val = board[side][idx];
        const countEl = document.getElementById(`count-${side}-${idx}`);
        const dotsEl = document.getElementById(`dots-${side}-${idx}`);
        const pitEl = document.getElementById(`pit-${side}-${idx}`);

        countEl.textContent = val;
        pitEl.classList.toggle("empty", val === 0);
        pitEl.classList.toggle("dead", isDeadPit(side, idx));

        // Render grain dots
        dotsEl.innerHTML = "";
        const display = Math.min(val, 20); // Cap visual dots
        if (display === 0) return;

        // Measure pit to calculate exact midpoint radius
        const pitW = pitEl.offsetWidth || 50;
        const outerR = pitW / 2; // Pit border radius in px
        const innerR = 14; // Inner number circle radius (28px / 2)
        const midR = (outerR + innerR) / 2; // Exact midpoint in px
        const radiusPct = (midR / pitW) * 100; // Convert to % of pit width

        const positions = getGrainPositions(display, radiusPct);
        for (let g = 0; g < display; g++) {
          const dot = document.createElement("div");
          dot.className = "grain-dot";
          dot.style.left = positions[g].x + "%";
          dot.style.top = positions[g].y + "%";
          dotsEl.appendChild(dot);
        }
      }

      function getGrainPositions(count, radiusPct) {
        const positions = [];
        if (count === 0) return positions;
        const r = radiusPct || 35; // Fallback
        const startAngle = -Math.PI / 2; // Start from 12 o'clock

        // All dots placed on a single perfect circle, equal angular gaps
        for (let i = 0; i < count; i++) {
          const angle = startAngle + (i / count) * Math.PI * 2;
          positions.push({
            x: 50 + Math.cos(angle) * r,
            y: 50 + Math.sin(angle) * r,
          });
        }
        return positions;
      }

      function mulberry32(a) {
        return function () {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function renderScores() {
        document.getElementById("scorePlayer").textContent = scores.player;
        document.getElementById("scoreOpp").textContent = scores.opp;
      }

      function renderTurn() {
        const turnText = document.getElementById("turnText");
        const dot = document.getElementById("turnDot");
        const cardP = document.getElementById("scoreCardPlayer");
        const cardO = document.getElementById("scoreCardOpp");

        if (gameOver) {
          turnText.textContent = "Game Over";
          dot.style.background = "var(--text-dim)";

          cardO.classList.remove("active");

            turnText.textContent = "Player 2's Turn";
          } else {
            turnText.textContent = "Your Turn";
          }
          dot.style.background = "var(--player-accent)";
          cardP.classList.add("active");
          cardO.classList.remove("active");
        } else {
          if (gameMode === "two") {
            turnText.textContent = "Player 1's Turn";
          } else {
            turnText.textContent = "AI Thinking...";
          }
          dot.style.background = "var(--opponent-accent)";
          cardO.classList.add("active");
          cardP.classList.remove("active");
        }
      }

      function renderHand(count) {
        const display = document.getElementById("handDisplay");
        const countEl = document.getElementById("handCount");
        const ring = document.getElementById("handGrainRing");

        if (count > 0) {
          display.classList.add("visible");
          countEl.textContent = count;

          // Render small grain dots orbiting inside the circle
          ring.innerHTML = "";
          const show = Math.min(count, 12);
          const radius = 42; // % from center
          for (let i = 0; i < show; i++) {
            const angle = -Math.PI / 2 + (i / show) * Math.PI * 2;
            const dot = document.createElement("div");
            dot.className = "hand-grain-dot";
            dot.style.left = 50 + Math.cos(angle) * radius + "%";
            dot.style.top = 50 + Math.sin(angle) * radius + "%";
            dot.style.animationDelay = i * 0.03 + "s";
            ring.appendChild(dot);
          }
        } else {
          display.classList.remove("visible");
          countEl.textContent = "";
          ring.innerHTML = "";
