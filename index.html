      }

      // Position the hand orb on the correct side of the board
      function positionHandForSide(side) {
        const display = document.getElementById("handDisplay");
        if (side === "opp") {
          display.classList.add("top-side");
        } else {
          display.classList.remove("top-side");
        }
      }

      function updateClickable() {
        const rowPlayer = document.getElementById("rowPlayer");
        const rowOpp = document.getElementById("rowOpponent");

        for (let i = 0; i < PITS_PER_SIDE; i++) {
          const playerPit = document.getElementById(`pit-player-${i}`);
          const oppPit = document.getElementById(`pit-opp-${i}`);
          // Dead pits are never clickable
          const playerDead = isDeadPit("player", i);
          const oppDead = isDeadPit("opp", i);
          // Player side clickable
          playerPit.classList.toggle(
            "clickable",
            !playerDead &&
              isPlayerTurn &&
              !isAnimating &&
              !gameOver &&
              board.player[i] > 0,
          );
          // Opponent side clickable only in two-player mode when it's opponent's turn
          if (gameMode === "two") {
            oppPit.classList.toggle(
              "clickable",
              !oppDead &&
                !isPlayerTurn &&
                !isAnimating &&
                !gameOver &&
                board.opp[i] > 0,
            );
          } else {
            oppPit.classList.remove("clickable");
          }
        }

        // Highlight the active player's row
        if (gameOver || isAnimating) {
          rowPlayer.classList.remove("active-turn");
          rowOpp.classList.remove("active-turn");
        } else if (isPlayerTurn) {
          rowPlayer.classList.add("active-turn");
          rowOpp.classList.remove("active-turn");
        } else {
          rowOpp.classList.add("active-turn");
          rowPlayer.classList.remove("active-turn");
        }

        // Add semantic turn classes to body for ambient background lighting
        if (gameOver) {
          document.body.classList.remove("turn-player", "turn-opp");
        } else if (isPlayerTurn) {
          document.body.classList.add("turn-player");
          document.body.classList.remove("turn-opp");
        } else {
          document.body.classList.add("turn-opp");
          document.body.classList.remove("turn-player");
        }
      }

      function setStatus(msg) {
        document.getElementById("statusBar").textContent = msg;
      }

      // ═══════════════════════════════════════════════
      //  CLOCKWISE ORDER
      // ═══════════════════════════════════════════════
      // Pits in clockwise order:
      // opp[0], opp[1], ..., opp[6], player[0], player[1], ..., player[6]
      // Total 14 pits, indexes 0-13

      // Clockwise: Player 1→2→...→7 → Opponent 7→6→...→1 → back to Player 1
      // Linear 0-6 = player[0..6], Linear 7-13 = opp[6..0]

      function pitToLinear(side, idx) {
        if (side === "player") return idx; // player[0-6] → linear 0-6
        return 7 + (6 - idx); // opp[0] → 13, opp[6] → 7
      }

      function linearToPit(linear) {
        linear = ((linear % 14) + 14) % 14;
        if (linear < 7) return { side: "player", idx: linear };
        return { side: "opp", idx: 6 - (linear - 7) }; // linear 7 → opp[6], linear 13 → opp[0]
      }

      // Check if a pit is dead (not filled at round start, skipped during distribution)
      function isDeadPit(side, idx) {
        return deadPits[side][idx] === true;
      }

      // Advance to the next live (non-dead) pit in clockwise order
      function getNextLivePit(currentLinear) {
        let steps = 0;
        let next = currentLinear;
        do {
          next = (next + 1) % 14;
          steps++;
          const p = linearToPit(next);
          if (!isDeadPit(p.side, p.idx)) return next;
        } while (steps < 14); // Safety: avoid infinite loop if all pits are dead
        return (currentLinear + 1) % 14; // Fallback
      }

      function getPitValue(side, idx) {
        return board[side][idx];
      }

      function setPitValue(side, idx, val) {
        board[side][idx] = val;
      }

      // ═══════════════════════════════════════════════
      //  GAME LOGIC (with animation hooks)
      // ═══════════════════════════════════════════════
      function onPitClick(idx) {
        if (!isPlayerTurn || isAnimating || gameOver) return;
        if (board.player[idx] === 0) return;

        isAnimating = true;
        updateClickable();
        executeTurn("player", idx, true);
      }

      // ─── Get center point of a pit element (viewport coords) ───
      function getPitCenter(side, idx) {
        const el = document.getElementById(`pit-${side}-${idx}`);
        if (!el) return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const r = el.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      // ─── Get center of the hand display area ───
      function getHandCenter() {
        const orb = document.querySelector(".hand-orb");
        if (!orb)
          return { x: window.innerWidth / 2, y: window.innerHeight - 80 };
        const r = orb.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      // ─── Create a flying grain element ───
      function createFlyingGrain(x, y) {
        const grain = document.createElement("div");
        grain.className = "flying-grain";
        grain.style.left = x - 6 + "px";
        grain.style.top = y - 6 + "px";
        document.body.appendChild(grain);
        return grain;
      }

      // ─── Spawn a tiny landing burst effect ───
      function spawnLandBurst(x, y) {
        const burst = document.createElement("div");
        burst.className = "grain-land-burst";
        burst.style.left = x + "px";
        burst.style.top = y + "px";
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 400);
      }

      // ─── Fly a single grain from src to dest with arc ───
      function flyGrainTo(srcX, srcY, destX, destY, duration) {
        return new Promise((resolve) => {
          AudioManager.grainDrop(Math.random() * 5); // Add pitch variation
          const grain = createFlyingGrain(srcX, srcY);

          // Force layout so the initial position is painted
          void grain.offsetHeight;

          // Add transition class with dynamic duration and move
          const durationSec = (duration / 1000).toFixed(2);
          grain.style.transition = `left ${durationSec}s cubic-bezier(.2,.6,.35,1), top ${durationSec}s cubic-bezier(.2,.0,.35,1)`;
          grain.classList.add("in-flight");
          grain.style.left = destX - 6 + "px";
          grain.style.top = destY - 6 + "px";

          // Spawn trail dots along the path
          let trailCount = 0;
          const trailInterval = setInterval(() => {
            if (trailCount >= 3) {
              clearInterval(trailInterval);
              return;
            }
            const t = (trailCount + 1) / 4;
            const tx = srcX + (destX - srcX) * t;
            const ty = srcY + (destY - srcY) * t - Math.sin(t * Math.PI) * 15;
            const trail = document.createElement("div");
            trail.className = "grain-trail";
            trail.style.left = tx - 2.5 + "px";
            trail.style.top = ty - 2.5 + "px";
            document.body.appendChild(trail);
            safeTimeout(() => trail.remove(), 500);
            trailCount++;
          }, duration / 5);

          safeTimeout(() => {
            clearInterval(trailInterval);
            grain.remove();
            spawnLandBurst(destX, destY);
            resolve();
          }, duration);
        });
      }

      // ─── Fly grains from a pit to the hand area (collecting) ───
      function flyGrainsToHand(side, idx, count) {
        return new Promise((resolve) => {
          const src = getPitCenter(side, idx);
          const hand = getHandCenter();
          const displayCount = Math.min(count, 12); // Cap visual grains

          for (let i = 0; i < displayCount; i++) {
            safeTimeout(() => {
              const g = document.createElement("div");
              g.className = "collecting-grain";
              // Scatter from random positions within the pit
              const angle = (i / displayCount) * Math.PI * 2;
              const scatter = 8 + Math.random() * 6;
              const sx = src.x + Math.cos(angle) * scatter;
              const sy = src.y + Math.sin(angle) * scatter;
              g.style.left = sx - 5 + "px";
              g.style.top = sy - 5 + "px";
              document.body.appendChild(g);

              // Force layout then fly to hand
              void g.offsetHeight;
              g.style.left = hand.x - 5 + (Math.random() - 0.5) * 30 + "px";
              g.style.top = hand.y - 5 + "px";
              g.style.opacity = "0.6";

              safeTimeout(() => g.remove(), 380);
            }, i * 30);
          }

          // Wait for last grain to finish flying
          safeTimeout(resolve, displayCount * 30 + 380);
        });
      }

      // ─── Distribute grains: fly them from hand to each pit sequentially ───
      async function distributeGrainsAnimated(
        sourceSide,
        sourceIdx,
        destinations,
      ) {
        // destinations is an array of {side, idx} in order
        const handPos = getHandCenter();

        for (let i = 0; i < destinations.length; i++) {
          const dest = destinations[i];
          const destPos = getPitCenter(dest.side, dest.idx);

          // Fly a grain from hand area to the destination pit
          const flyPromise = flyGrainTo(
            handPos.x + (Math.random() - 0.5) * 20,
            handPos.y + (Math.random() - 0.5) * 8,
            destPos.x,
            destPos.y,
            GRAIN_FLY_MS,
          );

          // Decrement hand count immediately as grain leaves
          renderHand(destinations.length - i - 1);

          // Wait for grain to land before sending the next one
          await flyPromise;

          // Update game state exactly as it lands
          board[dest.side][dest.idx]++;
          renderPit(dest.side, dest.idx);
          triggerAnim(`pit-${dest.side}-${dest.idx}`, "dropping");

          // Check INSTANT-4 CAPTURE RULE immediately
          if (board[dest.side][dest.idx] === 4) {
            const owner = dest.side === "player" ? "player" : "opp";
            return {
              stoppedAt: i,
              instant4: { side: dest.side, idx: dest.idx, owner },
            };
          }

          // Small pause between grains for visual clarity
          await sleep(GRAIN_STAGGER_MS);
        }

        return { stoppedAt: destinations.length - 1, instant4: null };
      }

      async function executeTurn(side, pitIdx, animate) {
        const startLinear = pitToLinear(side, pitIdx);
        let hand = board[side][pitIdx];
        board[side][pitIdx] = 0;
        lastTurnSide = side; // Track who played last for turn order

        if (animate) {
          // Position hand orb on correct side of board and make it visible
          positionHandForSide(side);
          // Show the orb (empty) so its position is correct for grain flight
          const display = document.getElementById("handDisplay");
          display.classList.add("visible");
          document.getElementById("handCount").textContent = "";
          document.getElementById("handGrainRing").innerHTML = "";
          // Force layout so position is calculated
          void display.offsetHeight;

          // Mark last picked pit
          clearLastPicked();
          markLastPicked(side, pitIdx);
          triggerAnim(`pit-${side}-${pitIdx}`, "picking");
          renderPit(side, pitIdx);

          // Fly grains from pit to hand
          await flyGrainsToHand(side, pitIdx, hand);
          renderHand(hand);
          await sleep(200);
        }

        let currentLinear = startLinear;
        let turnScores = { player: 0, opp: 0 };
        let chainPickCount = 0; // Safety counter for infinite loop prevention

        while (true) {
          // Safety: prevent infinite chain picks
          if (++chainPickCount > MAX_CHAIN_PICKS) {
            console.warn("Chain pick limit reached, force-ending turn");
            break;
          }
          if (animate) {
            // Build list of destination pits for this batch of distribution
            const destinations = [];
            let tempLinear = currentLinear;
            for (let g = 0; g < hand; g++) {
              tempLinear = getNextLivePit(tempLinear);
              const p = linearToPit(tempLinear);
              destinations.push({ side: p.side, idx: p.idx });
            }

            // Animate all grains flying to their destinations
            const result = await distributeGrainsAnimated(
              side,
              pitIdx,
              destinations,
            );

            // Update currentLinear to wherever we stopped
            let advancedLinear = currentLinear;
            for (let s = 0; s <= result.stoppedAt; s++) {
              advancedLinear = getNextLivePit(advancedLinear);
            }
            currentLinear = advancedLinear;
            hand = 0;

            // Handle instant-4 if it occurred
            if (result.instant4) {
              const { side: i4Side, idx: i4Idx, owner } = result.instant4;
              scores[owner] += 4;
              turnScores[owner] += 4;
              board[i4Side][i4Idx] = 0;

              triggerAnim(`pit-${i4Side}-${i4Idx}`, "instant4");
              showScoreFly(i4Side, i4Idx, "+4", owner);
              renderPit(i4Side, i4Idx);
              renderScores();
              await sleep(350);

              // Need to continue distributing remaining grains after instant-4
              const remaining = destinations.length - result.stoppedAt - 1;
              if (remaining > 0) {
                hand = remaining;
                // We already updated board for grains up to stoppedAt.
                // But grains after stoppedAt were NOT yet added to board.
                // Let's recalculate: the remaining dests haven't been applied yet.
                // Actually, distributeGrainsAnimated applies board changes one at a time
                // and stops early on instant-4. So remaining grains ARE still in hand.
                renderHand(hand);
                // Continue the while loop to distribute remaining
                continue;
              }
            }

            await sleep(ANIM_SETTLE_MS);
          } else {
            // Non-animated: just do the logic
            while (hand > 0) {
              currentLinear = getNextLivePit(currentLinear);
              const p = linearToPit(currentLinear);
              board[p.side][p.idx]++;
              hand--;

              if (board[p.side][p.idx] === 4) {
                const owner = p.side === "player" ? "player" : "opp";
                scores[owner] += 4;
                turnScores[owner] += 4;
                board[p.side][p.idx] = 0;
              }
            }
          }

          // CHAIN PICK RULE
          const nextLinear = getNextLivePit(currentLinear);
          const nextPit = linearToPit(nextLinear);

          if (board[nextPit.side][nextPit.idx] > 0) {
            // Pick up from next pit and continue
            hand = board[nextPit.side][nextPit.idx];
            board[nextPit.side][nextPit.idx] = 0;
            currentLinear = nextLinear;

            if (animate) {
              // Move hand orb to the side of the chain-pick
              positionHandForSide(side);
              // Show empty orb for correct position
              const display = document.getElementById("handDisplay");
              display.classList.add("visible");
              document.getElementById("handCount").textContent = "";
              document.getElementById("handGrainRing").innerHTML = "";
              void display.offsetHeight;

              clearLastPicked();
              markLastPicked(nextPit.side, nextPit.idx);
              AudioManager.pitSelect();
              triggerAnim(`pit-${nextPit.side}-${nextPit.idx}`, "picking");
              renderPit(nextPit.side, nextPit.idx);

              // Fly grains from pit to hand
              await flyGrainsToHand(nextPit.side, nextPit.idx, hand);
              renderHand(hand);
              await sleep(200);
            }
          } else {
            // EMPTY STOP → CAPTURE from the pit AFTER the empty one
            const captureLinear = getNextLivePit(nextLinear);
            const capturePit = linearToPit(captureLinear);

  if (playerSeeds <= 3) drainBonus = 15;      
  else if (playerSeeds <= 7) drainBonus = 8;

    if (boardState.player[i] === 3) playerCapturePotential++;

    if (boardState.player[i] === 0) playerEmptyPits++;

    if (boardState.player[i] > 0) playerActivePits++;

         (aiCapturePotential * 3) -

         ((playerEmptyPits - aiEmptyPits) * 1.5) +

function boardHash(boardState, scoresState, depth, isMax) {

  for (let i = 0; i < PITS_PER_SIDE; i++) key += boardState.player[i] + ',';
  key += '|' + scoresState.opp + '|' + scoresState.player + '|' + depth + '|' + (isMax ? 1 : 0);

function minimaxAB(boardState, scoresState, depth, alpha, beta, isMaximizing) {

  if (_aiNodeCount % 500 === 0) {

      return evaluateBoard(boardState, scoresState);
    }

  if (_aiTimedOut) {

  }

  const validMoves = getValidMoves(boardState, side);

  if (depth === 0 || validMoves.length === 0) {

  }

  const oppTotal = boardState.opp.reduce((a, b) => a + b, 0);
  const playerTotal = boardState.player.reduce((a, b) => a + b, 0);
  if (oppTotal === 0 || playerTotal === 0) {
    return evaluateBoard(boardState, scoresState);
  }

  const hashKey = boardHash(boardState, scoresState, depth, isMaximizing);
  if (_transpositionTable.has(hashKey)) {
    return _transpositionTable.get(hashKey);
  }

  if (isMaximizing) {
    let maxEval = -Infinity;
    const orderedMoves = (depth >= 2) ? preEvaluateMoves(boardState, scoresState, 'opp').map(m => m.move) : validMoves;
    for (const move of orderedMoves) {

      const sim = executeTurnSim(boardState, scoresState, 'opp', move);
      const evalScore = minimaxAB(sim.board, sim.scores, depth - 1, alpha, beta, false);
      maxEval = Math.max(maxEval, evalScore);
      alpha = Math.max(alpha, evalScore);
      if (beta <= alpha) break; 
    }
    if (!_aiTimedOut) _transpositionTable.set(hashKey, maxEval);
    return maxEval;
  } else {
    let minEval = Infinity;
    const orderedMoves = (depth >= 2) ? preEvaluateMoves(boardState, scoresState, 'player').map(m => m.move) : validMoves;
    for (const move of orderedMoves) {

      const evalScore = minimaxAB(sim.board, sim.scores, depth - 1, alpha, beta, true);

      if (beta <= alpha) break;

              isPlayerTurn = true;
              isAiTurn = false;
              renderTurn();
              setStatus("AI has no moves — your turn again");
              isAnimating = false;
              updateClickable();
            } else {
              // Player has moves, wait for click
              setStatus("Opponent has no moves — your turn again");
              isAnimating = false;
              updateClickable();
            }
          }
          return;
        }

        isPlayerTurn = !isPlayerTurn;
        renderTurn();
        updateClickable();

        if (gameMode === "two") {
          // Two player: just update status, both sides controlled by humans
          if (isPlayerTurn) {
            setStatus("Player 2 — tap a pit on your side");
          } else {
            setStatus("Player 1 — tap a pit on your side");
          }
          isAnimating = false;
          updateClickable();
        } else {
          // Single player: AI takes over
          if (!isPlayerTurn) {
            isAiTurn = true;
            await aiTurn();
          } else {
            isAiTurn = false;
            setStatus("Tap a pit on your side");
            isAnimating = false;
            updateClickable();
            updateUndoButton();
            updateResetRoundButton();
          }
        }
      }

      // ─── Force end the round (called by cycle/stalemate/max-move detection) ───
      async function forceEndRound(message) {
        const playerBoardTotal = board.player.reduce((a, b) => a + b, 0);
        const oppBoardTotal = board.opp.reduce((a, b) => a + b, 0);
        scores.player += playerBoardTotal;
        scores.opp += oppBoardTotal;
        board.player.fill(0);
        board.opp.fill(0);
        renderAll();
        gameOver = true;
        isAnimating = false;
        isAiTurn = false;
        renderTurn();
        setStatus(message);
        boardStateHistory = [];

        if (bgComputationTimeoutId) {
          clearTimeout(bgComputationTimeoutId);
          abortAiWorker();
        }

        await sleep(500);

        const playerTotalGrains = scores.player + bankedGrains.player;
        const oppTotalGrains = scores.opp + bankedGrains.opp;
        if (
          playerTotalGrains < INITIAL_GRAINS ||
          oppTotalGrains < INITIAL_GRAINS
        ) {
          showGameOver();
        } else {
          showRoundEnd(playerTotalGrains, oppTotalGrains);
        }
      }

      async function aiTurn(saveSnapshot = true) {
        // Track who picks first in this round (for alternation)
        if (firstPickSide === null) firstPickSide = "opp";

        if (saveSnapshot) saveUndoSnapshot();

        let move = -1;
        document.body.classList.add("ai-thinking");
        setStatus("");
        document.getElementById("turnDot").style.display = "none";

        // Phase 1: Wait for AI.
        // The strictly enforced timeout will abort the promise inside wait if time runs out.
        if (bgComputationPromise) {
          setStatus("AI is thinking...");
          move = await bgComputationPromise;
        } else {
          // If for some reason we didn't start bg computation (e.g. first move of the game)
          // We launch it now with exactly 5 seconds budget.
          startAiBgComputation({ board: board, scores: scores }, 0);
          move = await bgComputationPromise;
        }

        // Clear the promise and timeout since it has resolved.
        bgComputationPromise = null;
        if (bgComputationTimeoutId) {
          clearTimeout(bgComputationTimeoutId);
          bgComputationTimeoutId = null;
        }

        document.body.classList.remove("ai-thinking");
        document.getElementById("turnDot").style.display = "block";

        // Fallback if AI found no moves (e.g. invalid state)
        if (move === -1 || board.opp[move] === 0) {
          move = getBestAiMoveFallback();
          if (move === -1) {
            isPlayerTurn = true;
            isAnimating = false;
            isAiTurn = false;
            renderAll();
            updateUndoButton();
            return;
          }
        }

        // Phase 2: Indicate the chosen pit (strictly NO mathematical calculation here per rules)
        const chosenPitEl = document.getElementById(`pit-opp-${move}`);
        if (chosenPitEl) chosenPitEl.classList.add("ai-pit-indicator");
        setStatus(`AI choosing pit ${move + 1}...`);
        await sleep(AI_INDICATE_MS);
        if (chosenPitEl) chosenPitEl.classList.remove("ai-pit-indicator");

        // Phase 3: Execute the turn with AI-specific grain timing
        setStatus(`AI plays pit ${move + 1}`);

        if (move !== -1 && board.opp[move] > 0) {
          // Quick sim to see expected grains for this specific turn
          const sim = executeTurnSim(board, scores, "opp", move);
          const expectedCapture = sim.scores.opp - scores.opp;
          console.log(
            `[AI MOVE] Selects Pit ${move + 1}. Expected immediate grain capture: ${expectedCapture}`,
          );
        }

        await executeTurn("opp", move, true);
        await endTurn();
      }

      // Hook into player turn end
      const origOnPitClick = onPitClick;
      async function playerTurnFlow(idx) {
        if (!isPlayerTurn || isAnimating || gameOver) return;
        if (board.player[idx] === 0) return;

        // Track who picks first in this round (for alternation)
        if (firstPickSide === null) firstPickSide = "player";

        // Save undo snapshot BEFORE executing the move
        saveUndoSnapshot();

        AudioManager.pitSelect();
        isAnimating = true;
        updateClickable();
        updateUndoButton();

        // In order to start the background calculation, we need to know the future state
        // and the estimated animation time.
        if (gameMode === "single") {
          // A quick local simulation function just to find the future board state
          // (A copy of the sim function to run quickly on the main thread)
          function quickSim(side, pitIdx) {
            const b = { opp: [...board.opp], player: [...board.player] };
            const s = { player: scores.player, opp: scores.opp };
            function toLinear(sd, id) {
              return sd === "player" ? id : 7 + (6 - id);
            }
            function fromLinear(lin) {
              lin = ((lin % 14) + 14) % 14;
              if (lin < 7) return { sd: "player", id: lin };
              return { sd: "opp", id: 6 - (lin - 7) };
            }
            function nextLive(cur) {
              let steps = 0,
                n = cur;
              do {
                n = (n + 1) % 14;
                steps++;
                const p = fromLinear(n);
                if (!deadPits[p.sd][p.id]) return n;
              } while (steps < 14);
              return (cur + 1) % 14;
            }

            let handGrains = b[side][pitIdx];
            b[side][pitIdx] = 0;
            let currLin = toLinear(side, pitIdx);
            let loops = 0;
            let totalGrainsMoved = 0;

            while (true) {
              if (++loops > 1000) break;
              totalGrainsMoved += handGrains; // Track how many grains we simulate moving
              while (handGrains > 0) {
                currLin = nextLive(currLin);
                const p = fromLinear(currLin);
                b[p.sd][p.id]++;
                handGrains--;
                if (b[p.sd][p.id] === 4) {
                  s[p.sd] += 4;
                  b[p.sd][p.id] = 0;
                }
              }
              const nextLin = nextLive(currLin);
              const n = fromLinear(nextLin);
              if (b[n.sd][n.id] > 0) {
                handGrains = b[n.sd][n.id];
                b[n.sd][n.id] = 0;
                currLin = nextLin;
              } else {
                const capLin = nextLive(nextLin);
                const c = fromLinear(capLin);
                if (b[c.sd][c.id] > 0) {
                  s[side] += b[c.sd][c.id];
                  b[c.sd][c.id] = 0;
                }
                break;
              }
            }
            return { board: b, scores: s, totalGrainsMoved };
          }

          // Run quick sim to figure out the future state and how many total grains fall
          const futureResult = quickSim("player", idx);

          // Mathematical Expected Animation Time Calculation:
          // Every grain takes GRAIN_FLY_MS to reach its destination, and pauses GRAIN_STAGGER_MS before the next one starts.
          // Plus ANIM_PICK_MS (500) jumping out of pit.
          const expectedAnimMs =
            ANIM_PICK_MS +
            futureResult.totalGrainsMoved * (GRAIN_FLY_MS + GRAIN_STAGGER_MS);

          console.log(
            `Estimated animation time: ${expectedAnimMs / 1000}s. AI gets this + 5s background time.`,
          );

          // Start Web Worker immediately
          startAiBgComputation(
            { board: futureResult.board, scores: futureResult.scores },
            expectedAnimMs,
          );
        }

        await executeTurn("player", idx, true);
        await endTurn();
      }

      // Override onPitClick
      function onPitClick(idx) {
        playerTurnFlow(idx);
      }

      function saveUndoSnapshot() {
        moveHistory.push({
          board: { opp: [...board.opp], player: [...board.player] },
          scores: { ...scores },
          isPlayerTurn: isPlayerTurn,
          deadPits: { opp: [...deadPits.opp], player: [...deadPits.player] },
          boardStateHistory: [...boardStateHistory],
          roundMoveCount: roundMoveCount,
        });
      }

      // Opponent pit click (two-player mode)
      function onOppPitClick(idx) {
        if (gameMode !== "two") return;
        if (isPlayerTurn || isAnimating || gameOver) return;
        if (board.opp[idx] === 0) return;

        // Track who picks first in this round (for alternation)
        if (firstPickSide === null) firstPickSide = "opp";

        saveUndoSnapshot();

        isAnimating = true;
        updateClickable();
        updateUndoButton();
        oppTurnFlow(idx);
      }

      async function oppTurnFlow(idx) {
        await executeTurn("opp", idx, true);
        await endTurn();
      }

      // ═══════════════════════════════════════════════
      //  UNDO / BACK / RESET
      // ═══════════════════════════════════════════════
      function undoLastMove() {
        if (moveHistory.length === 0 || isAnimating || isAiTurn || gameOver)
          return;

        clearAllTimeouts();
        const snapshot = moveHistory.pop();

        board.opp = [...snapshot.board.opp];
        board.player = [...snapshot.board.player];
        scores = { ...snapshot.scores };
        isPlayerTurn = snapshot.isPlayerTurn;
        deadPits.opp = [...snapshot.deadPits.opp];
        deadPits.player = [...snapshot.deadPits.player];
        boardStateHistory = [...snapshot.boardStateHistory];
        roundMoveCount = snapshot.roundMoveCount;

        gameOver = false;
        isAnimating = false;
        isAiTurn = false;
        preComputedAiMove = null;

        document.body.classList.remove("ai-thinking");
        document.getElementById("turnDot").style.display = "block";
        document
          .querySelectorAll(".pit")
          .forEach((p) => p.classList.remove("ai-pit-indicator"));

        renderAll();
        updateUndoButton();
        updatePrevRoundButton();
        updateResetRoundButton();
        setStatus("Move undone — tap a pit on your side");
        AudioManager.click();

        // If we restored to an AI turn, trigger AI turn again
        if (gameMode === "single" && !isPlayerTurn) {
          setStatus("AI is thinking...");
          isAiTurn = true;
          sleep(400).then(() => aiTurn(false)); // pass false to avoid saving snapshot again immediately
        }
      }

      function updateUndoButton() {
        const btn = document.getElementById("undoBtn");
        if (!btn) return;
        // Let player undo at any time it's their turn, or if they are in 2-player mode.
        // In single player during their turn, it undoes the AI's last move!
        const canUndo =
          moveHistory.length > 0 && !isAnimating && !isAiTurn && !gameOver;
        btn.style.display = canUndo ? "flex" : "none";
      }

      function resetCurrentRound() {
        if (isAnimating || gameOver) return;

        // The first snapshot in moveHistory for this round is the initial state of the round.
        // If there's no moveHistory, we're already at the start.
        if (moveHistory.length === 0) return;

        clearAllTimeouts();
        // Find the snapshot with roundMoveCount = 0 (the start of the round)
        let startSnapshot = moveHistory[0];

        board.opp = [...startSnapshot.board.opp];
        board.player = [...startSnapshot.board.player];
        scores = { ...startSnapshot.scores };
        isPlayerTurn = startSnapshot.isPlayerTurn;
        deadPits.opp = [...startSnapshot.deadPits.opp];
        deadPits.player = [...startSnapshot.deadPits.player];
        boardStateHistory = [];
        roundMoveCount = 0;

        gameOver = false;
        isAnimating = false;
        isAiTurn = false;
        preComputedAiMove = null;
        moveHistory = []; // clear history since we restarted the round

        document.body.classList.remove("ai-thinking");
        document.getElementById("turnDot").style.display = "block";
        document
          .querySelectorAll(".pit")
          .forEach((p) => p.classList.remove("ai-pit-indicator"));

        renderAll();
        updateUndoButton();
        updatePrevRoundButton();
        updateResetRoundButton();
        setStatus("Round reset — tap a pit to begin");
        AudioManager.click();

        if (gameMode === "single" && !isPlayerTurn) {
          setStatus("AI is thinking...");
          isAiTurn = true;
          sleep(400).then(() => aiTurn());
        }
      }

      function updateResetRoundButton() {
        const btn = document.getElementById("resetRoundBtn");
        if (!btn) return;
        btn.style.opacity = moveHistory.length > 0 ? "1" : "0.3";
        btn.style.pointerEvents = moveHistory.length > 0 ? "auto" : "none";
      }

      // ═══════════════════════════════════════════════
      //  GO TO PREVIOUS ROUND
      // ═══════════════════════════════════════════════
      function goToPreviousRound() {
        if (roundHistory.length === 0 || isAnimating) return;

        clearAllTimeouts();
        const snapshot = roundHistory.pop();

        board.opp = [...snapshot.board.opp];
        board.player = [...snapshot.board.player];
        scores = { ...snapshot.scores };
        bankedGrains = { ...snapshot.bankedGrains };
        deadPits.opp = [...snapshot.deadPits.opp];
        deadPits.player = [...snapshot.deadPits.player];
        roundNumber = snapshot.roundNumber;
        firstPickSide = snapshot.firstPickSide;
        isPlayerTurn = snapshot.isPlayerTurn;

        gameOver = false;
        isAnimating = false;
        isAiTurn = false;
        preComputedAiMove = null;
        boardStateHistory = [];
        roundMoveCount = 0;
        moveHistory = [];
        lastTurnSide = null;

        document.body.classList.remove("ai-thinking");
        document.getElementById("turnDot").style.display = "block";
        document
          .querySelectorAll(".pit")
          .forEach((p) => p.classList.remove("ai-pit-indicator"));

        renderAll();
        document.getElementById("roundBadge").textContent =
          `Round ${roundNumber}`;
        updateUndoButton();
        updatePrevRoundButton();
        updateResetRoundButton();
        setStatus(`Reverted to Round ${roundNumber} — tap a pit to begin`);
        AudioManager.click();

        // If AI should go first in this round, trigger AI turn
        if (gameMode === "single" && !isPlayerTurn) {
          sleep(400).then(() => aiTurn());
        }
      }

      function updatePrevRoundButton() {
        const btn = document.getElementById("prevRoundBtn");
        if (!btn) return;
        btn.style.opacity = roundHistory.length > 0 ? "1" : "0.3";
        btn.style.pointerEvents = roundHistory.length > 0 ? "auto" : "none";
      }

      // ═══════════════════════════════════════════════
      //  LAST-PICKED INDICATOR
      // ═══════════════════════════════════════════════
      function clearLastPicked() {
        document
          .querySelectorAll(".pit.last-picked")
          .forEach((el) => el.classList.remove("last-picked"));
      }

      function markLastPicked(side, idx) {
        const el = document.getElementById(`pit-${side}-${idx}`);
        if (el) el.classList.add("last-picked");
      }

      // ═══════════════════════════════════════════════
      //  ANIMATIONS
      // ═══════════════════════════════════════════════
      function triggerAnim(elId, animClass) {
        const el = document.getElementById(elId);
        if (!el) return;
        el.classList.remove(animClass);
        void el.offsetHeight; // Force reflow
        el.classList.add(animClass);
        safeTimeout(() => el.classList.remove(animClass), 700);

        // Extra effects for picking
        if (animClass === "picking") {
          // Expanding ring
          const ring = document.createElement("div");
          ring.className = "pick-ring";
          el.appendChild(ring);
          safeTimeout(() => ring.remove(), 750);

          // Burst particles
          spawnPickBurst(el);
        }
      }

      function spawnPickBurst(pitEl) {
        const rect = pitEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const colors = [
          "#ffd700",
          "#f0c040",
          "#ffed80",
          "#e8a000",
          "#fff4b0",
          "#f5d060",
        ];
        const count = 8;

        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const dist = 30 + Math.random() * 20;
          const dx = Math.cos(angle) * dist;
          const dy = Math.sin(angle) * dist;

          const p = document.createElement("div");
          p.className = "pick-particle";
          p.style.left = cx + "px";
          p.style.top = cy + "px";
          p.style.background = colors[i % colors.length];
          p.style.setProperty("--particle-dir", `translate(${dx}px, ${dy}px)`);
          p.style.animationDelay = i * 0.03 + "s";
          p.style.boxShadow = `0 0 6px ${colors[i % colors.length]}`;
          document.body.appendChild(p);
          safeTimeout(() => p.remove(), 800);
        }
      }

      function showScoreFly(side, idx, text, owner) {
        const pitEl = document.getElementById(`pit-${side}-${idx}`);
        if (!pitEl) return;
        const rect = pitEl.getBoundingClientRect();
        const fly = document.createElement("div");
        fly.className = `score-fly ${owner === "player" ? "player-fly" : "opponent-fly"}`;
        fly.textContent = text;
        fly.style.left = rect.left + rect.width / 2 - 15 + "px";
        fly.style.top = rect.top - 5 + "px";
        document.body.appendChild(fly);
        safeTimeout(() => fly.remove(), 1000);
      }

      function sleep(ms) {
        return new Promise((r) => safeTimeout(r, ms));
      }

      // ═══════════════════════════════════════════════
      //  GAME OVER
      // ═══════════════════════════════════════════════
      function showGameOver() {
        const modal = document.getElementById("gameOverModal");
        const icon = document.getElementById("modalIcon");
        const title = document.getElementById("modalTitle");
        const msg = document.getElementById("modalMessage");

        const p2Label = gameMode === "two" ? "Player 2" : "You";
        const p1Label = gameMode === "two" ? "Player 1" : "Opponent";

        if (scores.player > scores.opp) {
          icon.textContent = "🏆";
          title.textContent = `${p2Label} Win${gameMode === "two" ? "s" : ""}!`;
          msg.textContent = `${p2Label} captured ${scores.player} grains vs ${p1Label}'s ${scores.opp}. Brilliant strategy!`;
          spawnConfetti();
          AudioManager.win();
        } else if (scores.opp > scores.player) {
          icon.textContent = gameMode === "two" ? "🏆" : "😤";
          title.textContent = `${p1Label} Win${gameMode === "two" ? "s" : ""}!`;
          msg.textContent = `${p1Label} captured ${scores.opp} grains vs ${p2Label}'s ${scores.player}.${gameMode === "two" ? " Great game!" : " Try again!"}`;
          if (gameMode === "two") {
            spawnConfetti();
            AudioManager.win();
          } else {
            AudioManager.lose();
          }
        } else {
          icon.textContent = "🤝";
          title.textContent = "It's a Draw!";
          msg.textContent = `Both captured ${scores.player} grains. An evenly matched game!`;
          AudioManager.win();
        }

        modal.classList.add("show");
      }

      // ═══════════════════════════════════════════════
      //  ROUND TRANSITION
      // ═══════════════════════════════════════════════
      function showRoundEnd(playerTotalGrains, oppTotalGrains) {
        const modal = document.getElementById("roundEndModal");
        const title = document.getElementById("roundEndTitle");
        const msg = document.getElementById("roundEndMessage");
        const details = document.getElementById("roundEndDetails");

        const p2Label = gameMode === "two" ? "Player 2" : "You";
        const p1Label = gameMode === "two" ? "Player 1" : "Opponent";

        title.textContent = `Round ${roundNumber} Complete!`;
        msg.textContent = `${scores.player > scores.opp ? p2Label : p1Label} led this round. Preparing for Round ${roundNumber + 1}...`;

        // Calculate pit filling preview
        let playerPits = Math.floor(playerTotalGrains / INITIAL_GRAINS);
        let playerBank = playerTotalGrains % INITIAL_GRAINS;
        let oppPits = Math.floor(oppTotalGrains / INITIAL_GRAINS);
        let oppBank = oppTotalGrains % INITIAL_GRAINS;

        if (playerPits > PITS_PER_SIDE) {
          playerBank += (playerPits - PITS_PER_SIDE) * INITIAL_GRAINS;
          playerPits = PITS_PER_SIDE;
        }
        if (oppPits > PITS_PER_SIDE) {
          oppBank += (oppPits - PITS_PER_SIDE) * INITIAL_GRAINS;
          oppPits = PITS_PER_SIDE;
        }

        const playerDead = PITS_PER_SIDE - playerPits;
        const oppDead = PITS_PER_SIDE - oppPits;

        details.innerHTML = `
    <div style="margin-bottom:8px"><strong>${p1Label}:</strong></div>
    <div>Earned: <strong>${scores.opp}</strong> grains + Banked: <strong>${bankedGrains.opp}</strong> = <strong>${oppTotalGrains}</strong> total</div>
    <div>Next round: <strong>${oppPits}</strong> pits filled, <strong>${oppDead}</strong> dead, <strong>${oppBank}</strong> banked</div>
    <hr style="border-color:rgba(255,255,255,0.1); margin:8px 0">
    <div style="margin-bottom:8px"><strong>${p2Label}:</strong></div>
    <div>Earned: <strong>${scores.player}</strong> grains + Banked: <strong>${bankedGrains.player}</strong> = <strong>${playerTotalGrains}</strong> total</div>
    <div>Next round: <strong>${playerPits}</strong> pits filled, <strong>${playerDead}</strong> dead, <strong>${playerBank}</strong> banked</div>
  `;

        modal.classList.add("show");
      }

      function startNextRound() {
        document.getElementById("roundEndModal").classList.remove("show");
        setupNextRound();
      }

      function setupNextRound() {
        // Calculate total grains for each side
        const playerTotalGrains = scores.player + bankedGrains.player;
        const oppTotalGrains = scores.opp + bankedGrains.opp;

        // Fill pits: each pit gets exactly 5, fill left-to-right
        let playerPitsToFill = Math.floor(playerTotalGrains / INITIAL_GRAINS);
        let oppPitsToFill = Math.floor(oppTotalGrains / INITIAL_GRAINS);
        let playerStartingScore = playerTotalGrains % INITIAL_GRAINS;
        let oppStartingScore = oppTotalGrains % INITIAL_GRAINS;

        if (playerPitsToFill > PITS_PER_SIDE) {
          playerStartingScore +=
            (playerPitsToFill - PITS_PER_SIDE) * INITIAL_GRAINS;
          playerPitsToFill = PITS_PER_SIDE;
        }
        if (oppPitsToFill > PITS_PER_SIDE) {
          oppStartingScore += (oppPitsToFill - PITS_PER_SIDE) * INITIAL_GRAINS;
          oppPitsToFill = PITS_PER_SIDE;
        }

        // Set up board
        for (let i = 0; i < PITS_PER_SIDE; i++) {
          board.player[i] = i < playerPitsToFill ? INITIAL_GRAINS : 0;
          board.opp[i] = i < oppPitsToFill ? INITIAL_GRAINS : 0;

          // Mark dead pits
          deadPits.player[i] = i >= playerPitsToFill;
          deadPits.opp[i] = i >= oppPitsToFill;
        }

        // Leftover grains become the starting score for the new round (visible on scoreboard)
        scores.player = playerStartingScore;
        scores.opp = oppStartingScore;
        bankedGrains.player = 0;
        bankedGrains.opp = 0;

        // Turn order: ALTERNATE based on who picked first THIS round
        // If player picked first this round → opp picks first next round, and vice versa
        if (firstPickSide === "player") {
          isPlayerTurn = false; // opp goes first next round
        } else if (firstPickSide === "opp") {
          isPlayerTurn = true; // player goes first next round
        } else {
          // Fallback: use lastTurnSide
          isPlayerTurn = lastTurnSide === "player" ? false : true;
        }

        // Increment round
        roundNumber++;
        gameOver = false;
        isAnimating = false;
        isAiTurn = false;
        lastTurnSide = null;
        boardStateHistory = []; // Reset cycle detection for new round
        roundMoveCount = 0;
        moveHistory = [];

        // Save the NEW first pick side for this upcoming round (will be set on first move)
        const previousFirstPick = firstPickSide;
        firstPickSide = null; // Reset — will be set when someone actually picks first

        // Save round-start snapshot for "go to previous round"
        roundHistory.push({
          board: { opp: [...board.opp], player: [...board.player] },
          scores: { ...scores },
          bankedGrains: { ...bankedGrains },
          deadPits: { opp: [...deadPits.opp], player: [...deadPits.player] },
          roundNumber: roundNumber,
          firstPickSide: previousFirstPick,
          isPlayerTurn: isPlayerTurn,
        });

        // Render
        renderAll();
        document.getElementById("roundBadge").textContent =
          `Round ${roundNumber}`;
        updateUndoButton();
        updatePrevRoundButton();
        updateResetRoundButton();

        if (gameMode === "two") {
          const who = isPlayerTurn ? "Player 2" : "Player 1";
          setStatus(`Round ${roundNumber} — ${who}, tap a pit on your side`);
        } else {
          if (!isPlayerTurn) {
            isAiTurn = true;
            setStatus("Round " + roundNumber + " — AI is thinking...");
            sleep(400).then(() => aiTurn());
          } else {
            setStatus(`Round ${roundNumber} — Tap a pit on your side`);
          }
        }
      }

      function spawnConfetti() {
        const colors = [
          "#f0c040",
          "#ff6b6b",
          "#4ecdc4",
          "#a855f7",
          "#f472b6",
          "#34d399",
        ];
        for (let i = 0; i < 50; i++) {
          const piece = document.createElement("div");
          piece.className = "confetti-piece";
          piece.style.left = Math.random() * 100 + "vw";
          piece.style.top = -10 + "px";
          piece.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
          piece.style.width = 5 + Math.random() * 8 + "px";
          piece.style.height = 5 + Math.random() * 8 + "px";
          piece.style.animationDelay = Math.random() * 1 + "s";
          piece.style.animationDuration = 2 + Math.random() * 1.5 + "s";
          document.body.appendChild(piece);
          safeTimeout(() => piece.remove(), 4000);
        }
      }

      // ═══════════════════════════════════════════════
      //  MODALS & CONTROLS
      // ═══════════════════════════════════════════════
      function resetGame() {
        document.getElementById("gameOverModal").classList.remove("show");
        showNewGameModal();
      }

      function showNewGameModal() {
        clearAllTimeouts();
        isAnimating = false;
        isAiTurn = false;
        gameOver = false;
        preComputedAiMove = null;
        document.body.classList.remove("ai-thinking");
        document.getElementById("coinTossOverlay").classList.remove("show");
        document.getElementById("modeSelectView").style.display = "";
        document.getElementById("diffSelectView").style.display = "none";
        document.getElementById("modeSubtitle").textContent =
          "Choose Game Mode";
        document.getElementById("newGameModal").classList.add("show");
      }

      function closeNewGameModal() {
        document.getElementById("newGameModal").classList.remove("show");
      }

      function chooseSinglePlayer() {
        AudioManager.init();
        AudioManager.click();
        document.getElementById("modeSelectView").style.display = "none";
        document.getElementById("diffSelectView").style.display = "";
        document.getElementById("modeSubtitle").textContent = "Single Player";
        updateDiffButtons();
      }

      function chooseTwoPlayer() {
        AudioManager.init();
        AudioManager.click();
        gameMode = "two";
        closeNewGameModal();
        updateLabels();
        // Hide game level badge for two-player mode
        document.getElementById("gameLevelBadge").style.display = "none";
        initBoard();
        // In two-player, opponent (Player 1) goes first
        isPlayerTurn = false;
        renderAll();
        updateUndoButton();
        updatePrevRoundButton();
        setStatus("Player 1 — tap a pit on your side");
      }

      function chooseProPlayer() {
        AudioManager.click();
        // Coming soon - do nothing
      }

      function backToModeSelect() {
        AudioManager.click();
        document.getElementById("modeSelectView").style.display = "";
        document.getElementById("diffSelectView").style.display = "none";
        document.getElementById("modeSubtitle").textContent =
          "Choose Game Mode";
      }

      function selectDifficulty(level) {
        AudioManager.click();
        pendingDifficulty = level;
        updateDiffButtons();
      }

      function updateDiffButtons() {
        document.querySelectorAll(".difficulty-btn").forEach((btn) => {
          btn.classList.toggle(
            "active",
            parseInt(btn.dataset.level) === pendingDifficulty,
          );
        });
      }

      function startNewGame() {
        AudioManager.click();
        gameMode = "single";
        aiDepth = pendingDifficulty;
        preComputedAiMove = null;
        closeNewGameModal();
        updateLabels();

        // Display difficulty setting in old badge (top scoreboard)
        const diffBadge = document.getElementById("difficultyBadge");
        if (gameMode === "single") {
          diffBadge.style.display = "inline-block";
          const diffNames = {
            0: "VERY EASY",
            1: "EASY",
            2: "MEDIUM",
            3: "HARD",
          };
          diffBadge.textContent = diffNames[aiDepth] || "EASY";
        } else {
          diffBadge.style.display = "none";
        }

        // Update game level badge (top-left corner)
        const levelBadge = document.getElementById("gameLevelBadge");
        if (gameMode === "single") {
          const levelNames = {
            0: "Very Easy",
            1: "Easy",
            2: "Medium",
            3: "Hard",
          };
          const levelClasses = {
            0: "level-veryeasy",
            1: "level-easy",
            2: "level-medium",
            3: "level-hard",
          };
          levelBadge.textContent = levelNames[aiDepth] || "Easy";
          levelBadge.className =
            "game-level-badge " + (levelClasses[aiDepth] || "level-easy");
          levelBadge.style.display = "flex";
        } else {
          levelBadge.style.display = "none";
        }

        initBoard();
        renderAll();
        updateUndoButton();
        updatePrevRoundButton();

        // Show coin toss for first round in single-player mode
        showCoinToss();
      }

      // ═══════════════════════════════════════════════
      //  COIN TOSS (First Round, Single Player)
      // ═══════════════════════════════════════════════
      function showCoinToss() {
        const overlay = document.getElementById("coinTossOverlay");
        const coin = document.getElementById("coinElement");
        const resultText = document.getElementById("coinResultText");
        const tossBtn = document.getElementById("coinTossBtn");

        overlay.classList.add("show");
        coin.className = "coin"; // Reset
        resultText.textContent = "";
        tossBtn.style.display = "inline-block";
        tossBtn.disabled = false;
        setStatus("Toss the coin to decide who goes first!");
      }

      function performCoinToss() {
        const coin = document.getElementById("coinElement");
        const resultText = document.getElementById("coinResultText");
        const tossBtn = document.getElementById("coinTossBtn");

        tossBtn.disabled = true;
        AudioManager.click();

        // Random result: 0 = heads (player first), 1 = tails (AI first)
        const result = Math.random() < 0.5 ? "heads" : "tails";

        // Add flip animation class
        coin.className = "coin flipping";

        // After flip animation (1.8s), show result
        safeTimeout(() => {
          coin.className = `coin result-${result}`;

          if (result === "heads") {
            resultText.textContent = "🎯 You go first!";
            resultText.style.color = "var(--player-accent)";
            isPlayerTurn = true;
            firstPickSide = null; // Will be set on first pick
          } else {
            resultText.textContent = "🤖 AI goes first!";
            resultText.style.color = "var(--opponent-accent)";
            isPlayerTurn = false;
            firstPickSide = null;
          }

          tossBtn.style.display = "none";

          // After showing result for 1.5s, start the game
          safeTimeout(() => {
            document.getElementById("coinTossOverlay").classList.remove("show");
            renderAll();

            if (!isPlayerTurn) {
              isAiTurn = true;
              setStatus("AI is thinking...");
              sleep(400).then(() => aiTurn());
            } else {
              setStatus("Your turn — tap a pit on your side");
            }
          }, 1500);
        }, 1800);
      }

      function updateLabels() {
        const labelOpp = document.getElementById("labelOpp");
        const labelPlayer = document.getElementById("labelPlayer");

        if (gameMode === "two") {
          labelOpp.textContent = "Player 1";
          labelPlayer.textContent = "Player 2";
          document.getElementById("difficultyBadge").style.display = "none";
        } else {
          labelOpp.textContent = "Opponent";
          labelPlayer.textContent = "You";
        }
      }

      // ═══════════════════════════════════════════════
      //  DEBUG / TESTING HELPERS (call from browser console)
      // ═══════════════════════════════════════════════
      // Usage: debugSkipRound(48, 22)  → Simulates round end where Player1=48, Player2=22
      function debugSkipRound(p1Grains, p2Grains) {
        if (!p1Grains && !p2Grains) {
          console.log("Usage: debugSkipRound(player1Grains, player2Grains)");
          console.log("Example: debugSkipRound(48, 22)");
          return;
        }
        // p1 = opp side, p2 = player side
        scores.opp = p1Grains;
        scores.player = p2Grains;
        board.player.fill(0);
        board.opp.fill(0);
        gameOver = true;
        isAnimating = false;
        lastTurnSide = "opp";
        renderAll();
        renderTurn();

        const playerTotalGrains = scores.player + bankedGrains.player;
        const oppTotalGrains = scores.opp + bankedGrains.opp;

        if (
          playerTotalGrains < INITIAL_GRAINS ||
          oppTotalGrains < INITIAL_GRAINS
        ) {
          console.log("MATCH OVER — a player cannot fill even 1 pit");
          showGameOver();
        } else {
          console.log(
            `Round ${roundNumber} ended. P1: ${oppTotalGrains} grains, P2: ${playerTotalGrains} grains`,
          );
          showRoundEnd(playerTotalGrains, oppTotalGrains);
        }
      }

      /**
       * debugSetBoard([5,5,5,5,5,5,5], [0,0,0,5,0,0,0], 20, 10)
       * Sets the exact board state.
       * First arg: Opponent (AI) pits (array of 7 or single number)
       * Second arg: Player pits (array of 7 or single number)
       * Third/Fourth: Scores (optional)
       */
      function debugSetBoard(oppPits, playerPits, oppScore, playerScore) {
        if (typeof oppPits === "number") board.opp.fill(oppPits);
        else if (Array.isArray(oppPits)) board.opp = [...oppPits];

        if (typeof playerPits === "number") board.player.fill(playerPits);
        else if (Array.isArray(playerPits)) board.player = [...playerPits];

        if (oppScore !== undefined) scores.opp = oppScore;
        if (playerScore !== undefined) scores.player = playerScore;

        // Calculate dead pits based on initial board state (pits starting at 0 are dead)
        for (let i = 0; i < PITS_PER_SIDE; i++) {
          deadPits.opp[i] = board.opp[i] === 0;
          deadPits.player[i] = board.player[i] === 0;
        }

        gameOver = false;
        isAnimating = false;
        boardStateHistory = []; // Reset cycle detection for the new state
        renderAll();
        renderTurn();
        console.log("Board updated manually. Current state:", {
          board,
          scores,
          deadPits,
        });
      }

      /**
       * debugPlayMove('opp', 2)
       * Manually forces a move for the specified side.
       * side: 'player' (bottom) or 'opp' (top)
       * idx: 0-6
       */
      async function debugPlayMove(side, idx) {
        if (isAnimating) {
          console.error("Cannot play move while animating");
          return;
        }
        if (board[side][idx] === 0) {
          console.error("Pit is empty");
          return;
        }

        isAnimating = true;
        await executeTurn(side, idx, true);
        await endTurn();
      }

      /**
       * debugSetTurn('opp')
       * Switches the turn to the specified side.
       * side: 'player' or 'opp'
       */
      function debugSetTurn(side) {
        isPlayerTurn = side === "player";
        renderTurn();
        updateClickable();
        console.log("Turn set to:", side);
      }

      // ═══════════════════════════════════════════════
      //  BOOT
      // ═══════════════════════════════════════════════
      initBoard();
      buildDOM();
      renderAll();
      // Modal shows on load - game starts when user picks a mode
    </script>
  </body>
</html>
